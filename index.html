let scale=1,offX=0,offY=0;

function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const sr=vw/vh,gr=W/H;
  if(sr<gr){scale=vw/W;offX=0;offY=(vh-H*scale)/2;}
  else{scale=vh/H;offX=(vw-W*scale)/2;offY=0;}
  canvas.style.width=W*scale+'px';
  canvas.style.height=H*scale+'px';
  canvas.style.marginLeft=offX+'px';
  canvas.style.marginTop=offY+'px';
}
window.addEventListener('resize',resize);resize();

function canvasXY(cx,cy){return[(cx-offX)/scale,(cy-offY)/scale];}

// ---------------------------------------------------------------------------
// AUDIO ENGINE (Web Audio API — procedural)
// ---------------------------------------------------------------------------
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}

function playTone(freq,dur,type,vol,detune){
  try{
    ensureAudio();const g=audioCtx.createGain();const o=audioCtx.createOscillator();
    o.type=type||'square';o.frequency.value=freq;if(detune)o.detune.value=detune;
    g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
    // Disconnect nodes after playback to free mobile audio resources
    o.onended=()=>{try{o.disconnect();g.disconnect();}catch(e){}};
  }catch(e){}
}

function playNoise(dur,vol){
  try{
    ensureAudio();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g=audioCtx.createGain();g.gain.setValueAtTime(vol||0.1,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=1;
    s.connect(f);f.connect(g);g.connect(audioCtx.destination);s.start();
    // Stop and disconnect nodes after playback to free mobile audio resources
    setTimeout(()=>{try{s.stop();s.disconnect();f.disconnect();g.disconnect();}catch(e){}},Math.ceil(dur*1000)+50);
  }catch(e){}
}

function safeSFX(fn){try{fn();}catch(e){}}

let musicPlaying=false,musicOscs=[];
function startMusic(){
  if(musicPlaying)return;ensureAudio();musicPlaying=true;
  const notes=[262,294,330,349,392,440,494,523];
  let idx=0;
  function playNote(){
    if(!musicPlaying)return;
    const n=notes[idx%notes.length];
    playTone(n,0.15,'square',0.06);
    playTone(n/2,0.15,'sawtooth',0.04);
    idx++;setTimeout(playNote,200);
  }
  playNote();
}
function stopMusic(){musicPlaying=false;}

function inRect(px,py,r){return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h;}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    const [x,y]=canvasXY(t.clientX,t.clientY);
    touch.active=true;touch.sx=x;touch.sy=y;touch.cx=x;touch.cy=y;touch.dx=0;touch.dy=0;touch.swipe='';
    // Defense buttons (left side)
    if(inRect(x,y,BTN.dodgeL))touchBtns.dodgeL=true;
    if(inRect(x,y,BTN.dodgeR))touchBtns.dodgeR=true;
    if(inRect(x,y,BTN.block))touchBtns.block=true;
    if(inRect(x,y,BTN.duck))touchBtns.duck=true;
    // Attack buttons (right side)
    if(inRect(x,y,BTN.jabL))touchBtns.jabL=true;
    if(inRect(x,y,BTN.jabR))touchBtns.jabR=true;
    if(inRect(x,y,BTN.hookL))touchBtns.hookL=true;
    if(inRect(x,y,BTN.hookR))touchBtns.hookR=true;
    if(inRect(x,y,BTN.special))touchBtns.special=true;
    if(inRect(x,y,BTN.pause))touchBtns.pause=true;
    if(touch.taps.length>10)touch.taps.shift();
    touch.taps.push({x,y,t:performance.now()});
    tapMashCount++;
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    const [x,y]=canvasXY(t.clientX,t.clientY);
    touch.cx=x;touch.cy=y;touch.dx=x-touch.sx;touch.dy=y-touch.sy;
    const dist=Math.sqrt(touch.dx*touch.dx+touch.dy*touch.dy);
    if(dist>30){
      if(Math.abs(touch.dx)>Math.abs(touch.dy)){
        touch.swipe=touch.dx<0?'left':'right';
      }else{
        touch.swipe=touch.dy<0?'up':'down';
      }
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();touch.active=false;
  touchBtns.dodgeL=false;touchBtns.dodgeR=false;touchBtns.block=false;touchBtns.duck=false;
  touchBtns.jabL=false;touchBtns.jabR=false;touchBtns.hookL=false;touchBtns.hookR=false;touchBtns.special=false;touchBtns.pause=false;
  touch.swipe='';
},{passive:false});

// Mouse fallback for desktop
canvas.addEventListener('mousedown',e=>{
  const [x,y]=canvasXY(e.clientX,e.clientY);
  if(touch.taps.length>10)touch.taps.shift();
  touch.taps.push({x,y,t:performance.now()});
  if(inRect(x,y,BTN.dodgeL))touchBtns.dodgeL=true;
  if(inRect(x,y,BTN.dodgeR))touchBtns.dodgeR=true;
  if(inRect(x,y,BTN.block))touchBtns.block=true;
  if(inRect(x,y,BTN.duck))touchBtns.duck=true;
  if(inRect(x,y,BTN.jabL))touchBtns.jabL=true;
  if(inRect(x,y,BTN.jabR))touchBtns.jabR=true;
  if(inRect(x,y,BTN.hookL))touchBtns.hookL=true;
  if(inRect(x,y,BTN.hookR))touchBtns.hookR=true;
  if(inRect(x,y,BTN.special))touchBtns.special=true;
  if(inRect(x,y,BTN.pause))touchBtns.pause=true;
  tapMashCount++;
});
canvas.addEventListener('mouseup',()=>{
  touchBtns.dodgeL=false;touchBtns.dodgeR=false;touchBtns.block=false;touchBtns.duck=false;
  touchBtns.jabL=false;touchBtns.jabR=false;touchBtns.hookL=false;touchBtns.hookR=false;touchBtns.special=false;touchBtns.pause=false;
});

// DRAWING HELPERS

function drawRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function drawRRect(x,y,w,h,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
function drawText(txt,x,y,font,col,align,stroke){
  ctx.font=font||'14px monospace';ctx.textAlign=align||'center';ctx.textBaseline='middle';
  if(stroke){ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(txt,x,y);}
  ctx.fillStyle=col||'#fff';ctx.fillText(txt,x,y);
}
function drawBar(x,y,w,h,pct,col,bg){
  drawRRect(x,y,w,h,4,bg||'#333');
  if(pct>0)drawRRect(x+2,y+2,Math.max(0,(w-4)*pct),h-4,3,col);
}

function drawRoosterFront(x,y,sc,col,animState,animTime,trait,specialId){
  // Opponent rooster — facing camera
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  const bob=Math.sin(animTime*4)*3;
  let ox=0,oy=bob,scaleX=1,scaleY=1;
  if(animState==='hit'){ox=Math.sin(animTime*30)*10;oy=-8;}
  if(animState==='dodge_l'){ox=-45;}
  if(animState==='dodge_r'){ox=45;}
  if(animState==='duck'){oy=35;}
  if(animState==='jab'){
    // Jab — quick lunge forward (toward camera = scale up + move down)
    const t=Math.min(animTime*8,1);
    const retract=animTime>0.1?Math.min((animTime-0.1)*8,1):0;
    const p=t*(1-retract*0.5);
    oy+=30*p;scaleX=1+0.18*p;scaleY=1+0.18*p;
  }
  if(animState==='hook'){
    // Hook — torso twists sideways with power
    const t=Math.min(animTime*6,1);
    const retract=animTime>0.12?Math.min((animTime-0.12)*6,1):0;
    const p=t*(1-retract*0.4);
    ox=40*Math.sin(p*Math.PI*0.7);oy+=15*p;scaleX=1+0.12*p;scaleY=1+0.12*p;
  }
  if(animState==='uppercut'){
    // Uppercut — crouch down then explode upward
    const t=Math.min(animTime*6,1);
    if(t<0.4){
      const crouch=t/0.4;
      oy+=20*crouch;scaleY=1-0.1*crouch; // compress down
    }else{
      const rise=(t-0.4)/0.6;
      oy=20-50*rise;scaleX=1+0.25*rise;scaleY=1+0.25*rise;
    }
  }
  if(animState==='body_blow'){
    // Body blow — lean forward and punch low
    const t=Math.min(animTime*7,1);
    const retract=animTime>0.1?Math.min((animTime-0.1)*7,1):0;
    const p=t*(1-retract*0.5);
    oy+=35*p;scaleX=1+0.1*p;scaleY=0.88+0.05*p;
  }
  if(animState==='block'){oy=5;}
  if(animState==='kd'){oy=60;ox=Math.sin(animTime*2)*10;}
  if(animState==='tell'){
    // Tell — dramatic wind-up that's VERY visible
    const pulse=Math.sin(animTime*18)*8;
    oy-=12+pulse; // pull way back
    scaleX=0.92;scaleY=0.92; // compress/crouch
  }
  if(animState==='special'){
    const st=Math.min(animTime*3,1);
    if(specialId===0){// El Gallo - Sombrero Spin
      const spin=animTime*10;
      ox=Math.sin(spin)*15;oy-=10;scaleX=0.7+Math.abs(Math.cos(spin))*0.5;scaleY=1+0.15*st;
    }else if(specialId===1){// Nok Chai - Muay Thai Knee
      oy-=25*st;scaleX=1+0.15*st;scaleY=1+0.2*st;
    }else if(specialId===2){// Rayo - Havana Hurricane
      const spin=animTime*12;
      ox=Math.sin(spin)*20;oy-=10*st;scaleX=1+0.1*st;scaleY=1+0.1*st;
    }else if(specialId===3){// Garuda - Monsoon Wave
      ox=Math.sin(animTime*4)*12;oy-=8+Math.sin(animTime*3)*8;scaleX=1+0.15*st;scaleY=1+0.15*st;
    }else if(specialId===4){// Trovão - Capoeira Storm
      oy+=20-40*st;scaleX=1+0.2*st;scaleY=0.8+0.1*st;// crouching low
    }else if(specialId===5){// Tetsuo - Iron Feather Strike
      ox=-15*st;oy-=5;scaleX=1+0.25*st;scaleY=0.9+0.05*st;// coiled to one side
    }else if(specialId===6){// Ciclón - Caribbean Crossfire
      oy-=10*st;scaleX=1+0.2*st;scaleY=1+0.2*st;
    }else if(specialId===7){// Agni - Tandoori Blast
      oy+=15*(1-st);scaleX=1+0.35*st;scaleY=1+0.35*st;// gets HUGE
    }else if(specialId===8){// Coq d'Or - Fleur-de-Lis Feint
      ox=20*st;oy+=15*st;scaleX=1+0.1*st;scaleY=0.85+0.1*st;// lunging forward
    }else if(specialId===9){// Mabuhay - Typhoon Fury
      oy-=30*st;scaleX=1+0.3*st;scaleY=1+0.3*st;// rising up menacingly
    }else if(specialId===-1){// Boto - Power Boto hip thrust
      const cycle=animTime*6;
      const thrust=Math.sin(cycle);
      oy+=18*Math.max(0,thrust);// hips forward
      ox=Math.sin(cycle*0.5)*4;
      scaleX=1+0.1*Math.max(0,thrust);scaleY=1-0.08*Math.max(0,thrust);// squash on thrust
    }else{
      oy-=15+Math.sin(animTime*20)*5;scaleX=1+0.3*st;scaleY=1+0.3*st;
    }
  }
  if(animState==='dizzy'){
    // Dizzy — sways side to side with stars
    ox=Math.sin(animTime*3)*15;
    oy-=10;
  }
  ctx.translate(ox,oy);
  ctx.scale(scaleX,scaleY);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,60,40,10,0,0,Math.PI*2);ctx.fill();

  // Tail feathers (behind body)
  ctx.fillStyle=col.feath;
  for(let i=-2;i<=2;i++){
    ctx.save();ctx.rotate(i*0.15);
    ctx.beginPath();ctx.moveTo(-5,-30);ctx.quadraticCurveTo(-15+i*8,-70,i*12,-85+Math.abs(i)*5);
    ctx.quadraticCurveTo(i*5,-65,5,-30);ctx.fill();ctx.restore();
  }

  // Body
  ctx.fillStyle=col.body;ctx.beginPath();ctx.ellipse(0,15,35,40,0,0,Math.PI*2);ctx.fill();
  // Chest highlight
  ctx.fillStyle=col.acc;ctx.beginPath();ctx.ellipse(0,20,20,25,0,0,Math.PI*2);ctx.fill();

  // Wings
  ctx.fillStyle=col.feath;
  ctx.beginPath();ctx.ellipse(-38,10,15,28,0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(38,10,15,28,-0.2,0,Math.PI*2);ctx.fill();

  // Legs
  ctx.strokeStyle='#dd9933';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-12,50);ctx.lineTo(-15,65);ctx.stroke();
  ctx.beginPath();ctx.moveTo(12,50);ctx.lineTo(15,65);ctx.stroke();

  // Head
  ctx.fillStyle=col.body;ctx.beginPath();ctx.ellipse(0,-25,22,20,0,0,Math.PI*2);ctx.fill();
  // Comb
  ctx.fillStyle=col.comb;
  ctx.beginPath();ctx.moveTo(-8,-42);ctx.lineTo(-3,-55);ctx.lineTo(3,-48);ctx.lineTo(8,-58);ctx.lineTo(13,-45);ctx.lineTo(8,-42);ctx.closePath();ctx.fill();
  // Wattle
  ctx.fillStyle=col.wattle;ctx.beginPath();ctx.ellipse(0,-8,6,8,0,0,Math.PI*2);ctx.fill();
  // Beak
  ctx.fillStyle=col.beak;ctx.beginPath();ctx.moveTo(-3,-22);ctx.lineTo(0,-15);ctx.lineTo(3,-22);ctx.closePath();ctx.fill();
  // Eyes
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-9,-28,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(9,-28,6,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-9,-28,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(9,-28,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-8,-29,1.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(10,-29,1.2,0,Math.PI*2);ctx.fill();

  // Boxing gloves — each attack visually distinct
  let gx1=-50,gx2=50,gy1=5,gy2=5,gs1=14,gs2=14;
  let oLTrail=false,oRTrail=false,trailType='straight';

  if(animState==='jab'){
    // JAB — left glove shoots straight at camera (grows big fast)
    const t=Math.min(animTime*8,1);
    const retract=animTime>0.1?Math.min((animTime-0.1)*8,1):0;
    const p=t*(1-retract*0.5);
    gx1=-50+50*p;gy1=5+25*p;gs1=14+16*p; // gets huge as it reaches you
    oLTrail=true;trailType='straight';
  }
  if(animState==='hook'){
    // HOOK — right glove sweeps in a wide arc from right side
    const t=Math.min(animTime*6,1);
    const retract=animTime>0.12?Math.min((animTime-0.12)*6,1):0;
    const p=t*(1-retract*0.4);
    const arc=p*Math.PI*0.7;
    gx2=65-Math.sin(arc)*80;gy2=-5+Math.cos(arc)*20+p*15;gs2=14+12*p;
    oRTrail=true;trailType='hook';
  }
  if(animState==='uppercut'){
    // UPPERCUT — glove rises from below center, straight up, gets massive
    const t=Math.min(animTime*6,1);
    const retract=animTime>0.12?Math.min((animTime-0.12)*5,1):0;
    const p=t*(1-retract*0.3);
    gx1=0;gy1=40-70*p;gs1=14+18*p; // starts low, rises up huge
    gx2=50;gy2=5; // other glove stays back
    oLTrail=true;trailType='uppercut';
  }
  if(animState==='body_blow'){
    // BODY BLOW — left glove drives forward and low
    const t=Math.min(animTime*7,1);
    const retract=animTime>0.1?Math.min((animTime-0.1)*7,1):0;
    const p=t*(1-retract*0.5);
    gx1=-40+40*p;gy1=15+20*p;gs1=14+12*p;
    oLTrail=true;trailType='straight';
  }
  if(animState==='tell'){
    // Wind-up — pull gloves back, coiling, vibrating with energy
    const pulse=Math.sin(animTime*18)*8;
    gy1=-20+pulse;gy2=-15+pulse;
    gx1=-58-pulse;gx2=58+pulse;
    gs1=13+Math.abs(pulse)*0.3;gs2=13+Math.abs(pulse)*0.3;
  }
  if(animState==='block'){gy1=-15;gy2=-15;gx1=-30;gx2=30;gs1=16;gs2=16;}
  if(animState==='special'){
    const st=Math.min(animTime*3,1);
    if(specialId===0){// El Gallo - arms wide spinning
      const spin=animTime*10;
      gx1=-75*Math.abs(Math.cos(spin));gy1=-5+Math.sin(spin)*15;gs1=16+4*st;
      gx2=75*Math.abs(Math.cos(spin));gy2=-5-Math.sin(spin)*15;gs2=16+4*st;
      oLTrail=true;oRTrail=true;trailType='hook';
    }else if(specialId===1){// Nok Chai - clinch position high
      gx1=-20;gy1=-55-10*st;gs1=18+6*st;
      gx2=20;gy2=-55-10*st;gs2=18+6*st;
      oLTrail=true;oRTrail=true;trailType='straight';
    }else if(specialId===2){// Rayo - one arm whipping around
      const spin=animTime*12;
      gx1=-20+Math.cos(spin)*70;gy1=-10+Math.sin(spin)*30;gs1=16+8*st;
      gx2=30;gy2=-20;gs2=14;
      oLTrail=true;trailType='hook';
    }else if(specialId===3){// Garuda - sweeping wave arms
      const wave=animTime*5;
      gx1=-60-Math.sin(wave)*20;gy1=-15+Math.cos(wave)*25;gs1=16+4*st;
      gx2=60+Math.sin(wave)*20;gy2=-15-Math.cos(wave)*25;gs2=16+4*st;
      oLTrail=true;oRTrail=true;trailType='hook';
    }else if(specialId===4){// Trovão - hands low (on ground), capoeira
      gx1=-50;gy1=40+10*Math.sin(animTime*8);gs1=18+4*st;
      gx2=50;gy2=40+10*Math.sin(animTime*8+1);gs2=18+4*st;
      oLTrail=true;oRTrail=true;trailType='hook';
    }else if(specialId===5){// Tetsuo - iaido slash across
      const slash=Math.min(animTime*4,1);
      gx1=-80+130*slash;gy1=-30+10*Math.sin(slash*Math.PI);gs1=20+10*st;
      gx2=40;gy2=10;gs2=14;
      oLTrail=true;trailType='hook';
    }else if(specialId===6){// Ciclón - arms cross in X then burst
      const cross=Math.sin(animTime*6);
      if(cross>0){
        gx1=-15+cross*10;gy1=-30;gs1=18+6*st;
        gx2=15-cross*10;gy2=-30;gs2=18+6*st;
      }else{
        gx1=-70*Math.abs(cross);gy1=-20+cross*15;gs1=18+6*st;
        gx2=70*Math.abs(cross);gy2=-20-cross*15;gs2=18+6*st;
      }
      oLTrail=true;oRTrail=true;trailType='special';
    }else if(specialId===7){// Agni - both fists pulled back then SLAM
      const slam=Math.min(animTime*2.5,1);
      if(slam<0.6){
        const wind=slam/0.6;
        gx1=-25;gy1=-50-20*wind;gs1=20+12*wind;
        gx2=25;gy2=-50-20*wind;gs2=20+12*wind;
      }else{
        const smash=(slam-0.6)/0.4;
        gx1=-15+smash*5;gy1=-70+90*smash;gs1=32-8*smash;
        gx2=15-smash*5;gy2=-70+90*smash;gs2=32-8*smash;
      }
      oLTrail=true;oRTrail=true;trailType='straight';
    }else if(specialId===8){// Coq d'Or - fencing lunge
      const lunge=Math.min(animTime*4,1);
      gx1=10+50*lunge;gy1=0+20*lunge;gs1=14+8*lunge;// rapier thrust forward
      gx2=-40-15*lunge;gy2=-30-10*lunge;gs2=12;// elegant back arm
      oLTrail=true;trailType='straight';
    }else if(specialId===9){// Mabuhay - arms overhead channeling
      const charge=Math.min(animTime*2,1);
      const pulse=Math.sin(animTime*15)*5;
      gx1=-15+pulse;gy1=-60-25*charge;gs1=20+14*charge;
      gx2=15-pulse;gy2=-60-25*charge;gs2=20+14*charge;
      oLTrail=true;oRTrail=true;trailType='special';
    }else if(specialId===-1){// Boto - Power Boto hip thrust
      const cycle=animTime*6;
      const thrust=Math.sin(cycle);
      const pump=Math.max(0,thrust);
      // Fists at hips, pumping with the thrust
      gx1=-40-8*pump;gy1=10+12*pump;gs1=16+3*pump;
      gx2=40+8*pump;gy2=10+12*pump;gs2=16+3*pump;
      if(thrust>0.7){// on peak, fists punch forward
        const peak=(thrust-0.7)/0.3;
        gx1=-30+25*peak;gy1=15-20*peak;gs1=19+5*peak;
        gx2=30-25*peak;gy2=15-20*peak;gs2=19+5*peak;
      }
      oLTrail=true;oRTrail=true;trailType='straight';
    }else{
      const orbit=animTime*20;
      gx1=-20+Math.cos(orbit)*15;gy1=-35+Math.sin(orbit)*15;
      gx2=20-Math.cos(orbit)*15;gy2=-35-Math.sin(orbit)*15;
      gs1=16+8*st;gs2=16+8*st;
      oLTrail=true;oRTrail=true;trailType='special';
    }
  }

  // -- Arm lines from wings/shoulders to gloves --
  ctx.strokeStyle=col.body;ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-38,10);ctx.quadraticCurveTo(gx1*0.4,gy1*0.5+10,gx1,gy1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(38,10);ctx.quadraticCurveTo(gx2*0.4,gy2*0.5+10,gx2,gy2);ctx.stroke();
  ctx.strokeStyle=col.acc;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-38,10);ctx.quadraticCurveTo(gx1*0.4,gy1*0.5+10,gx1,gy1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(38,10);ctx.quadraticCurveTo(gx2*0.4,gy2*0.5+10,gx2,gy2);ctx.stroke();

  // -- Speed trails for opponent attacks --
  if(oLTrail){
    ctx.globalAlpha=0.35;
    if(trailType==='hook'){
      // Arc swoosh trail
      ctx.strokeStyle=col.glove;ctx.lineWidth=gs1*0.6;ctx.lineCap='round';
      const at=Math.min(animTime*6,1);
      ctx.beginPath();ctx.arc(gx1,gy1+10,30,-Math.PI*0.3,-Math.PI*0.3+at*1.2);ctx.stroke();
    }else if(trailType==='uppercut'){
      // Vertical streak trail
      for(let i=1;i<=4;i++){
        ctx.fillStyle=col.glove;
        ctx.beginPath();ctx.ellipse(gx1,gy1+i*12,gs1*0.5*(1-i*0.15),gs1*0.35,0,0,Math.PI*2);ctx.fill();
      }
    }else if(trailType==='special'){
      // Circular energy trail
      ctx.strokeStyle='#ffdd00';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(0,-35,25+Math.sin(animTime*10)*8,0,Math.PI*2);ctx.stroke();
    }else{
      // Straight trail (jab/body blow)
      for(let i=1;i<=3;i++){
        ctx.fillStyle=col.glove;
        ctx.beginPath();ctx.ellipse(gx1-i*8*(gx1>0?1:-0.5),gy1-i*8,gs1*0.35*(1-i*0.2),gs1*0.3,0,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
  if(oRTrail&&trailType==='hook'){
    ctx.globalAlpha=0.35;
    ctx.strokeStyle=col.glove;ctx.lineWidth=gs2*0.6;ctx.lineCap='round';
    const at=Math.min(animTime*6,1);
    ctx.beginPath();ctx.arc(gx2+15,gy2+5,35,Math.PI*0.8,Math.PI*0.8-at*1.2,true);ctx.stroke();
    ctx.globalAlpha=1;
  }

  // -- Gloves with squash/stretch on impact --
  const impactL=oLTrail&&Math.min(animTime*8,1)>0.8;
  const impactR=oRTrail&&Math.min(animTime*6,1)>0.8;
  const sxL=impactL?1.25:1,syL=impactL?0.8:1;
  const sxR=impactR?1.25:1,syR=impactR?0.8:1;

  ctx.fillStyle=col.glove;
  // Left glove
  ctx.beginPath();ctx.ellipse(gx1,gy1,gs1*sxL,gs1*syL,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  // Glove shine
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(gx1-gs1*0.2,gy1-gs1*0.2,gs1*0.3,gs1*0.2,0,0,Math.PI*2);ctx.fill();
  // Right glove
  ctx.fillStyle=col.glove;
  ctx.beginPath();ctx.ellipse(gx2,gy2,gs2*sxR,gs2*syR,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(gx2+gs2*0.2,gy2-gs2*0.2,gs2*0.3,gs2*0.2,0,0,Math.PI*2);ctx.fill();

  // -- Impact flash ring on full extension --
  if(impactL){
    ctx.globalAlpha=0.4;ctx.strokeStyle='#fff';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(gx1,gy1,gs1*1.8,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(impactR){
    ctx.globalAlpha=0.4;ctx.strokeStyle='#fff';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(gx2,gy2,gs2*1.8,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }

  // Unique visual trait
  if(trait==='tiny'){/* already handled by scale */}
  if(trait==='purple_aura'){
    ctx.globalAlpha=0.15+Math.sin(animTime*3)*0.1;
    ctx.fillStyle='#9966ff';ctx.beginPath();ctx.ellipse(0,10,50,55,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  if(trait==='speed_lines'){
    ctx.strokeStyle='rgba(255,200,100,0.4)';ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      const ly=-30+i*20;ctx.beginPath();ctx.moveTo(-60,ly);ctx.lineTo(-60-15-Math.random()*20,ly);ctx.stroke();
    }
  }
  if(trait==='water_drips'){
    ctx.fillStyle='rgba(100,200,255,0.5)';
    for(let i=0;i<4;i++){
      const dx=-20+i*15,dy=-40+((animTime*40+i*30)%100);
      ctx.beginPath();ctx.ellipse(dx,dy,2,4,0,0,Math.PI*2);ctx.fill();
    }
  }
  if(trait==='steam'){
    ctx.globalAlpha=0.3;ctx.fillStyle='#ff4400';
    for(let i=0;i<3;i++){
      const sx=-15+i*15,sy=-50-Math.sin(animTime*2+i)*10;
      ctx.beginPath();ctx.ellipse(sx,sy,5+Math.sin(animTime*3+i)*3,8,0,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  if(trait==='armor_shine'){
    ctx.globalAlpha=0.2+Math.sin(animTime*2)*0.1;
    ctx.fillStyle='#ffddaa';
    ctx.beginPath();ctx.ellipse(-10,5,8,15,0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(12,0,6,10,-0.3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  if(trait==='mirror_eyes'){
    ctx.fillStyle='#fff';ctx.globalAlpha=0.5+Math.sin(animTime*4)*0.3;
    ctx.beginPath();ctx.arc(-9,-28,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(9,-28,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  if(trait==='fire_fists'){
    ctx.globalAlpha=0.6;
    for(const fx of [-50,50]){
      for(let i=0;i<3;i++){
        ctx.fillStyle=['#ff4400','#ff8800','#ffcc00'][i];
        ctx.beginPath();ctx.ellipse(fx,0-i*6,8-i*2,10-i*2,0,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
  if(trait==='afterimages'){
    // draw 2 ghost copies offset
    ctx.globalAlpha=0.12;
    ctx.translate(-12,0);
    // redraw body only as ghost
    ctx.fillStyle=col.body;ctx.beginPath();ctx.ellipse(0,15,35,40,0,0,Math.PI*2);ctx.fill();
    ctx.translate(24,0);
    ctx.beginPath();ctx.ellipse(0,15,35,40,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  if(trait==='lightning'){
    if(Math.random()>0.92){
      ctx.strokeStyle='#ffdd00';ctx.lineWidth=2;ctx.globalAlpha=0.8;
      ctx.beginPath();
      let lx=-10+Math.random()*20,ly=-70;
      ctx.moveTo(lx,ly);
      for(let i=0;i<4;i++){lx+=Math.random()*20-10;ly+=15+Math.random()*10;ctx.lineTo(lx,ly);}
      ctx.stroke();ctx.globalAlpha=1;
    }
  }

  // DIZZY animation — stars above head
  if(animState==='dizzy'){
    ctx.fillStyle='#ffdd00';
    for(let i=0;i<3;i++){
      const sx=-20+i*20+Math.sin(animTime*4+i)*8;
      const sy=-60+Math.cos(animTime*3+i)*10;
      drawStar(sx,sy,6);
    }
  }

  ctx.restore();
}

function drawRoosterBack(x,y,sc,col,animState,animTime,specialId){
  // Player rooster — back facing camera (Punch-Out!! style)
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  const bob=Math.sin(animTime*4)*2;
  let ox=0,oy=bob;
  if(animState==='hit'){ox=Math.sin(animTime*30)*6;oy=5;}
  if(animState==='dodge_l'){ox=-50;}
  if(animState==='dodge_r'){ox=50;}
  if(animState==='duck'){oy=35;}
  if(animState==='block'){oy=5;}
  if(animState==='kd'){oy=70;}
  // Snap lean into punches (fast in, ease out)
  const leanSnap=Math.min(animTime*20,1);
  if(animState==='jabL'){ox=-8*leanSnap;oy=bob-10*leanSnap;}
  if(animState==='jabR'){ox=8*leanSnap;oy=bob-10*leanSnap;}
  if(animState==='hookL'){ox=-22*leanSnap;oy=bob+5*leanSnap;} // wider lean for hooks
  if(animState==='hookR'){ox=22*leanSnap;oy=bob+5*leanSnap;}
  if(animState==='special'){
    if(specialId===-1){// Boto - Power Boto hip thrust
      const cycle=animTime*6;
      const thrust=Math.sin(cycle);
      oy=bob+12*Math.max(0,thrust);// hips forward on thrust
      ox=Math.sin(cycle*0.5)*3;// slight swagger
    }else{oy=bob-12*leanSnap;}
  }
  if(animState==='rapid'){ox=Math.sin(animTime*24)*10;oy=bob-8;}
  ctx.translate(ox,oy);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,70,50,12,0,0,Math.PI*2);ctx.fill();

  // Tail feathers (prominent from behind!)
  ctx.fillStyle=col.feath;
  for(let i=-3;i<=3;i++){
    ctx.save();ctx.rotate(i*0.12);
    ctx.beginPath();ctx.moveTo(-4,-40);
    ctx.quadraticCurveTo(-12+i*10,-100,i*18,-120+Math.abs(i)*8);
    ctx.quadraticCurveTo(i*6,-90,4,-40);ctx.fill();ctx.restore();
  }
  // Tail trim
  ctx.fillStyle=col.trim;
  for(let i=-2;i<=2;i++){
    ctx.save();ctx.rotate(i*0.1);
    ctx.beginPath();ctx.moveTo(-2,-38);
    ctx.quadraticCurveTo(-8+i*7,-85,i*14,-105+Math.abs(i)*6);
    ctx.quadraticCurveTo(i*4,-78,2,-38);ctx.fill();ctx.restore();
  }

  // Body
  ctx.fillStyle=col.body;ctx.beginPath();ctx.ellipse(0,15,42,48,0,0,Math.PI*2);ctx.fill();
  // Back pattern
  ctx.fillStyle=col.acc;ctx.beginPath();ctx.ellipse(0,10,25,30,0,0,Math.PI*2);ctx.fill();

  // Wings
  ctx.fillStyle=col.feath;
  ctx.beginPath();ctx.ellipse(-45,10,18,35,0.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(45,10,18,35,-0.15,0,Math.PI*2);ctx.fill();

  // Legs
  ctx.strokeStyle='#dd9933';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(-15,58);ctx.lineTo(-18,78);ctx.stroke();
  ctx.beginPath();ctx.moveTo(15,58);ctx.lineTo(18,78);ctx.stroke();

  // Head (seen from behind — top of head, comb visible)
  ctx.fillStyle=col.body;ctx.beginPath();ctx.ellipse(0,-28,20,18,0,0,Math.PI*2);ctx.fill();
  // Comb
  ctx.fillStyle=col.comb;
  ctx.beginPath();ctx.moveTo(-6,-44);ctx.lineTo(-2,-58);ctx.lineTo(4,-50);ctx.lineTo(9,-60);ctx.lineTo(14,-47);ctx.lineTo(8,-44);ctx.closePath();ctx.fill();

  // Boxing gloves — snappy punch-and-retract animations
  let lgx=-55,lgy=0,rgx=55,rgy=0,lgs=16,rgs=16;
  let lTrail=false,rTrail=false,trailColor=col.glove;
  const t=animTime;
  // Snap out in 0.04s, hold briefly, retract — feels instant like SPO
  const snap=Math.min(t*25,1); // 0→1 in 0.04s
  const retract=t>0.08?Math.min((t-0.08)*12,1):0; // starts retracting at 0.08s
  const p=snap*(1-retract*0.6); // punches out then pulls back 60%

  // Left Jab — straight shot forward (small, fast, direct)
  if(animState==='jabL'){
    lgx=-35+p*25;lgy=-20-p*50;lgs=14-p*3;
    lTrail=true;
  }
  // Right Jab — straight shot forward
  if(animState==='jabR'){
    rgx=35-p*25;rgy=-20-p*50;rgs=14-p*3;
    rTrail=true;
  }
  // Left Hook — wide sweeping arc from far left to center (big, powerful)
  if(animState==='hookL'){
    const arc=p*Math.PI*0.6;
    lgx=-65+Math.sin(arc)*55;lgy=-10-Math.cos(arc)*35;lgs=18+p*6;
    lTrail=true;
  }
  // Right Hook — wide sweeping arc from far right to center
  if(animState==='hookR'){
    const arc=p*Math.PI*0.6;
    rgx=65-Math.sin(arc)*55;rgy=-10-Math.cos(arc)*35;rgs=18+p*6;
    rTrail=true;
  }
  // Block — both gloves up in guard
  if(animState==='block'){lgx=-30;lgy=-20;rgx=30;rgy=-20;lgs=18;rgs=18;}
  // Special/KO punch — wind up then blast
  if(animState==='special'){
    if(specialId===-1){// Boto - Power Boto - hip thrust
      const cycle=animTime*6;
      const thrust=Math.sin(cycle);
      const pump=Math.max(0,thrust);// 0-1 on forward thrust
      // Arms pump with the hips — fists at waist, elbows back
      lgx=-45-10*pump;lgy=5+15*pump;lgs=18+4*pump;
      rgx=45+10*pump;rgy=5+15*pump;rgs=18+4*pump;
      // On the thrust peak, gloves swing forward
      if(thrust>0.7){
        const peak=(thrust-0.7)/0.3;
        lgx=-40+20*peak;lgy=10-25*peak;lgs=20+6*peak;
        rgx=40-20*peak;rgy=10-25*peak;rgs=20+6*peak;
      }
      lTrail=true;rTrail=true;
    }else{
      lgx=-30+p*22;lgy=-30-p*50;lgs=16+p*12;
      rgx=30-p*22;rgy=-30-p*50;rgs=16+p*12;
      lTrail=true;rTrail=true;
    }
  }
  // Rapid punch — fast alternating
  if(animState==='rapid'){
    const alt=Math.floor(t*24)%2;
    if(alt===0){lgx=-30;lgy=-55;lgs=13;rgx=55;rgy=0;rgs=16;lTrail=true;}
    else{rgx=30;rgy=-55;rgs=13;lgx=-55;lgy=0;lgs=16;rTrail=true;}
  }

  // -- Arm lines connecting shoulders to gloves --
  ctx.strokeStyle=col.body;ctx.lineWidth=6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-35,0);ctx.quadraticCurveTo(lgx*0.5,lgy*0.3,lgx,lgy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(35,0);ctx.quadraticCurveTo(rgx*0.5,rgy*0.3,rgx,rgy);ctx.stroke();
  // Inner arm highlight
  ctx.strokeStyle=col.acc;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-35,0);ctx.quadraticCurveTo(lgx*0.5,lgy*0.3,lgx,lgy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(35,0);ctx.quadraticCurveTo(rgx*0.5,rgy*0.3,rgx,rgy);ctx.stroke();

  // -- Speed trails behind punching gloves --
  if(lTrail&&p>0.2){
    ctx.globalAlpha=0.3*(1-retract);
    const isHook=animState==='hookL'||animState==='special';
    if(isHook){
      // Curved swoosh for hooks
      ctx.strokeStyle=col.glove;ctx.lineWidth=lgs*0.8;ctx.lineCap='round';
      ctx.beginPath();ctx.arc(lgx+(animState==='hookL'?-30:0),lgy+15,35,Math.PI*0.8,Math.PI*0.8+p*1.5);ctx.stroke();
    }else{
      // Straight lines for jabs
      for(let i=1;i<=3;i++){
        ctx.fillStyle=col.glove;
        ctx.beginPath();ctx.ellipse(lgx+i*6,lgy+i*14,lgs*0.4*(1-i*0.2),lgs*0.3,0,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
  if(rTrail&&p>0.2){
    ctx.globalAlpha=0.3*(1-retract);
    const isHook=animState==='hookR'||animState==='special';
    if(isHook){
      ctx.strokeStyle=col.glove;ctx.lineWidth=rgs*0.8;ctx.lineCap='round';
      ctx.beginPath();ctx.arc(rgx+(animState==='hookR'?30:0),rgy+15,35,-Math.PI*0.2,-Math.PI*0.2-p*1.5,true);ctx.stroke();
    }else{
      for(let i=1;i<=3;i++){
        ctx.fillStyle=col.glove;
        ctx.beginPath();ctx.ellipse(rgx-i*6,rgy+i*14,rgs*0.4*(1-i*0.2),rgs*0.3,0,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }

  // -- Gloves with impact squash/stretch --
  ctx.fillStyle=col.glove;
  const lStretchX=lTrail&&p>0.8?1.2:1, lStretchY=lTrail&&p>0.8?0.85:1;
  const rStretchX=rTrail&&p>0.8?1.2:1, rStretchY=rTrail&&p>0.8?0.85:1;
  // Left glove
  ctx.beginPath();ctx.ellipse(lgx,lgy,lgs*lStretchX,lgs*lStretchY,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=2;ctx.stroke();
  // Glove highlight
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.ellipse(lgx-lgs*0.2,lgy-lgs*0.25,lgs*0.35,lgs*0.25,0,0,Math.PI*2);ctx.fill();
  // Right glove
  ctx.fillStyle=col.glove;
  ctx.beginPath();ctx.ellipse(rgx,rgy,rgs*rStretchX,rgs*rStretchY,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=2;ctx.stroke();
  // Glove highlight
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.ellipse(rgx+rgs*0.2,rgy-rgs*0.25,rgs*0.35,rgs*0.25,0,0,Math.PI*2);ctx.fill();

  // -- Impact flash at glove tip on full extension --
  if((lTrail||rTrail)&&p>0.85&&retract<0.3){
    ctx.globalAlpha=0.5*(1-retract*3);
    ctx.fillStyle='#fff';
    if(lTrail){ctx.beginPath();ctx.arc(lgx,lgy,lgs*1.5,0,Math.PI*2);ctx.fill();}
    if(rTrail){ctx.beginPath();ctx.arc(rgx,rgy,rgs*1.5,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

function drawPen(oppIdx){
  const themes=[
    {sky:['#ff8844','#cc5522','#331100'],ground:'#c49040',fence:'#8b6914',crowd:['#ff3333','#33cc33','#ffffff'],decorations:'mexico'},
    {sky:['#4a1a3a','#2a0a2a','#110011'],ground:'#8b4513',fence:'#c8a000',crowd:['#ffaa00','#ff6600','#aa00aa'],decorations:'thailand'},
    {sky:['#ff9966','#cc6644','#442211'],ground:'#d4a060',fence:'#a07030',crowd:['#ff6699','#66ccff','#ffcc33'],decorations:'cuba'},
    {sky:['#2266aa','#114488','#0a2244'],ground:'#555555',fence:'#8b7355',crowd:['#ff4444','#ffffff','#44bbff'],decorations:'indonesia'},
    {sky:['#224400','#113300','#0a1100'],ground:'#6b8e23',fence:'#8b7765',crowd:['#ffcc00','#33cc33','#3366ff'],decorations:'brazil'},
    {sky:['#ddb8c0','#aa8090','#554455'],ground:'#d4c8a0',fence:'#8b0000',crowd:['#ff6666','#ffffff','#ff9999'],decorations:'japan'},
    {sky:['#44aacc','#2288aa','#0a4455'],ground:'#c49050',fence:'#7a5530',crowd:['#ff3333','#3333cc','#ffffff'],decorations:'dominican'},
    {sky:['#ff8833','#cc5500','#441a00'],ground:'#c4843a',fence:'#aa6633',crowd:['#ff6600','#ffcc00','#ff3366'],decorations:'india'},
    {sky:['#334466','#222244','#111133'],ground:'#888888',fence:'#444444',crowd:['#3344aa','#ffffff','#cc3344'],decorations:'france'},
    {sky:['#0a0a22','#050511','#000008'],ground:'#6b4423',fence:'#4a3015',crowd:['#ff3333','#ffcc00','#3344aa'],decorations:'philippines'},
  ];
  const t=themes[oppIdx]||themes[0];

  const skyG=ctx.createLinearGradient(0,0,0,H*0.55);
  skyG.addColorStop(0,t.sky[0]);skyG.addColorStop(0.5,t.sky[1]);skyG.addColorStop(1,t.sky[2]);
  ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H*0.66);

  drawPenDecorations(t.decorations,oppIdx);

  ctx.globalAlpha=0.4;
  for(let i=0;i<60;i++){
    const cx=20+i%20*26,cy=95+Math.floor(i/20)*22+Math.sin(i+stateTime*2)*3;
    ctx.fillStyle=t.crowd[i%3];
    ctx.beginPath();ctx.arc(cx,cy,5+Math.sin(i*0.7+stateTime*3),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.save();
  ctx.beginPath();
  ctx.ellipse(W/2,420,240,70,0,0,Math.PI*2);
  ctx.fillStyle=t.ground;ctx.fill();
  ctx.beginPath();
  ctx.ellipse(W/2,420,200,58,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;ctx.stroke();
  ctx.restore();

  ctx.strokeStyle=t.fence;ctx.lineWidth=5;
  ctx.beginPath();ctx.ellipse(W/2,420,250,75,0,0,Math.PI*2);ctx.stroke();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    const px=W/2+Math.cos(a)*250;
    const py=420+Math.sin(a)*75;
    ctx.fillStyle=t.fence;
    ctx.fillRect(px-4,py-30,8,35);
    const br=Math.min(0xff,parseInt(t.fence.slice(1,3),16)+0x30);
    const bg=Math.min(0xff,parseInt(t.fence.slice(3,5),16)+0x30);
    const bb=Math.min(0xff,parseInt(t.fence.slice(5,7),16)+0x30);
    ctx.fillStyle='#'+br.toString(16).padStart(2,'0')+bg.toString(16).padStart(2,'0')+bb.toString(16).padStart(2,'0');
    ctx.fillRect(px-6,py-34,12,6);
  }
}

function drawPenDecorations(type,oppIdx){
  switch(type){
    case 'mexico':
      for(let i=0;i<12;i++){
        const bx=i*48-10,by=60+Math.sin(i*0.8+stateTime)*5;
        ctx.fillStyle=['#ff3333','#33cc33','#ffcc00','#ff66aa','#3366ff'][i%5];
        ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+20,by);ctx.lineTo(bx+15,by+25);ctx.lineTo(bx+5,by+25);ctx.closePath();ctx.fill();
      }
      ctx.strokeStyle='#aa8855';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-10,65);ctx.quadraticCurveTo(270,50,550,65);ctx.stroke();
      ctx.fillStyle='#2d5a1e';
      ctx.fillRect(40,300,12,60);ctx.fillRect(30,310,10,25);ctx.fillRect(50,320,10,20);
      ctx.fillRect(470,310,12,55);ctx.fillRect(462,325,10,20);ctx.fillRect(480,315,10,25);
      break;
    case 'thailand':
      ctx.fillStyle='#c8a000';
      ctx.fillRect(30,120,18,250);ctx.fillRect(492,120,18,250);
      for(let p of [39,501]){
        ctx.beginPath();ctx.moveTo(p-10,120);ctx.lineTo(p,95);ctx.lineTo(p+10,120);ctx.fill();
        ctx.beginPath();ctx.moveTo(p-12,122);ctx.lineTo(p,100);ctx.lineTo(p+12,122);ctx.strokeStyle='#ffd700';ctx.lineWidth=1;ctx.stroke();
      }
      for(let i=0;i<5;i++){
        const lx=100+i*85,ly=80+Math.sin(i+stateTime*0.5)*8;
        ctx.fillStyle='rgba(255,150,50,0.6)';ctx.beginPath();ctx.ellipse(lx,ly,12,16,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,200,100,0.8)';ctx.beginPath();ctx.arc(lx,ly,5,0,Math.PI*2);ctx.fill();
      }
      break;
    case 'cuba':
      const bldgCols=['#e8a0a0','#a0c8e8','#e8d8a0','#a0e8b8'];
      for(let i=0;i<6;i++){
        const bx=i*95-10,bh=120+Math.sin(i*2)*30;
        ctx.fillStyle=bldgCols[i%4];
        ctx.fillRect(bx,200-bh+200,85,bh);
        ctx.fillStyle='rgba(0,0,0,0.2)';
        for(let w=0;w<3;w++)ctx.fillRect(bx+10+w*25,200-bh+210,15,20);
      }
      ctx.fillStyle='#5a3a1a';ctx.fillRect(255,160,8,200);
      ctx.fillStyle='#2a6a2a';
      for(let i=0;i<5;i++){
        const a=-0.8+i*0.4;
        ctx.save();ctx.translate(259,165);ctx.rotate(a);
        ctx.fillRect(-3,-50,6,50);ctx.restore();
      }
      break;
    case 'indonesia':
      ctx.fillStyle='#555';
      ctx.fillRect(200,130,30,240);ctx.fillRect(310,130,30,240);
      ctx.fillStyle='#777';
      ctx.beginPath();ctx.moveTo(200,130);ctx.lineTo(215,100);ctx.lineTo(230,130);ctx.fill();
      ctx.beginPath();ctx.moveTo(310,130);ctx.lineTo(325,100);ctx.lineTo(340,130);ctx.fill();
      ctx.fillStyle='#1a5a2a';
      for(let i=0;i<4;i++){
        const px=50+i*140,py=340;
        ctx.beginPath();ctx.ellipse(px,py,20,35,0,0,Math.PI*2);ctx.fill();
      }
      break;
    case 'brazil':
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.save();ctx.translate(W/2,80);
      ctx.fillRect(-3,0,6,40);ctx.fillRect(-25,5,50,5);
      ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
      ctx.restore();
      ctx.strokeStyle='rgba(255,200,50,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,130);ctx.quadraticCurveTo(270,115,540,130);ctx.stroke();
      for(let i=0;i<10;i++){
        const lx=30+i*52;
        const ly=128-Math.sin(i/9*Math.PI)*12;
        ctx.fillStyle=['#ffcc00','#ff3333','#33cc33'][i%3];
        ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fill();
      }
      for(let i=0;i<8;i++){
        const bx=i*72-10,bh=60+Math.random()*40;
        ctx.fillStyle='rgba('+(140+i*12)+','+(100+i*8)+','+(60+i*5)+',0.5)';
        ctx.fillRect(bx,370-bh,62,bh);
      }
      break;
    case 'japan':
      ctx.fillStyle='#cc2222';
      ctx.fillRect(180,100,10,260);ctx.fillRect(350,100,10,260);
      ctx.fillRect(170,100,180,12);ctx.fillRect(175,125,170,8);
      ctx.fillStyle='rgba(255,180,200,0.6)';
      for(let i=0;i<15;i++){
        const bx=(i*73+stateTime*30)%560;
        const by=(i*47+stateTime*40)%300+60;
        ctx.beginPath();ctx.arc(bx,by,3,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='rgba(100,80,120,0.3)';
      ctx.beginPath();ctx.moveTo(0,180);ctx.lineTo(120,100);ctx.lineTo(250,160);ctx.lineTo(350,90);ctx.lineTo(450,150);ctx.lineTo(540,120);ctx.lineTo(540,200);ctx.lineTo(0,200);ctx.fill();
      break;
    case 'dominican':
      ctx.fillStyle='#1a6a2a';
      for(let i=0;i<3;i++){
        const px=80+i*190;
        ctx.save();ctx.translate(px,40);
        for(let f=0;f<5;f++){
          ctx.save();ctx.rotate(-0.8+f*0.4+Math.sin(stateTime*0.5)*0.05);
          ctx.fillRect(-4,-60,8,60);ctx.restore();
        }
        ctx.restore();
      }
      for(let i=0;i<18;i++){
        ctx.fillStyle=i%2?'#7a5530':'#8a6540';
        ctx.fillRect(i*32-5,310,28,60);
      }
      break;
    case 'india':
      ctx.strokeStyle='#cc7722';ctx.lineWidth=4;
      for(let i=0;i<3;i++){
        const ax=90+i*180;
        ctx.beginPath();ctx.arc(ax,200,60,Math.PI,0);ctx.stroke();
        ctx.fillStyle='rgba(200,120,30,0.2)';ctx.beginPath();ctx.arc(ax,200,58,Math.PI,0);ctx.fill();
      }
      ctx.fillStyle='#ff9900';
      for(let i=0;i<20;i++){
        const gx=i*28+5,gy=145+Math.sin(i*0.5)*8;
        ctx.beginPath();ctx.arc(gx,gy,6,0,Math.PI*2);ctx.fill();
      }
      break;
    case 'france':
      ctx.fillStyle='rgba(255,255,255,0.12)';
      ctx.save();ctx.translate(W/2,30);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-30,120);ctx.lineTo(-15,120);ctx.lineTo(-10,80);ctx.lineTo(10,80);ctx.lineTo(15,120);ctx.lineTo(30,120);ctx.closePath();ctx.fill();
      ctx.fillRect(-4,0,8,5);
      ctx.restore();
      for(let lp of [60,480]){
        ctx.fillStyle='#444';ctx.fillRect(lp-2,150,4,220);
        ctx.fillStyle='rgba(255,220,100,0.5)';ctx.beginPath();ctx.arc(lp,150,10,0,Math.PI*2);ctx.fill();
      }
      break;
    case 'philippines':
      ctx.fillStyle='#6a5a30';
      for(let i=0;i<20;i++){
        ctx.fillRect(i*28+5,290,6,80);
      }
      for(let i=0;i<6;i++){
        const tx=50+i*90,ty=250+Math.sin(i)*15;
        ctx.fillStyle='#5a3a1a';ctx.fillRect(tx-2,ty,4,40);
        ctx.fillStyle='rgba(255,150,50,'+(0.4+Math.sin(stateTime*3+i)*0.2)+')';
        ctx.beginPath();ctx.arc(tx,ty,8+Math.sin(stateTime*4+i)*2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,200,100,0.7)';
        ctx.beginPath();ctx.arc(tx,ty-2,4,0,Math.PI*2);ctx.fill();
      }
      for(let i=0;i<30;i++){
        const sx=Math.sin(i*7.3)*250+270,sy=Math.cos(i*5.1)*60+50;
        ctx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(stateTime+i)*0.2)+')';
        ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();
      }
      break;
  }
}

let particles=[];
function addHitEffect(x,y,big){
  // Color variety for hit sparks - mix red/orange for big hits
  const colors=big?['#ffdd00','#ff8844','#ff4444','#ffaa00']:['#fff','#ffdd00','#ffccaa'];
  for(let i=0;i<(big?12:6);i++){
    particles.push({
      x,y,vx:(Math.random()-0.5)*200*(big?2:1),vy:-Math.random()*300*(big?1.5:1),
      life:0.5+Math.random()*0.3,maxLife:0.5+Math.random()*0.3,
      size:big?6:3,col:colors[Math.floor(Math.random()*colors.length)],type:Math.random()>0.5?'star':'circle'
    });
  }
  // Feathers with tint matching the hit type
  const featherTint=big?'#ff6644':'#ddffdd';
  for(let i=0;i<(big?4:2);i++){
    particles.push({
      x,y,vx:(Math.random()-0.5)*150,vy:-Math.random()*200,
      life:0.8,maxLife:0.8,size:5,col:featherTint,type:'feather',rot:Math.random()*6
    });
  }
}

function addTextEffect(text,x,y,color){
  particles.push({
    x,y,vx:0,vy:-80,
    life:0.8,maxLife:0.8,
    size:24,col:color,type:'text',text:text
  });
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=500*dt;p.life-=dt;
    if(p.type==='feather')p.rot+=dt*5;
    if(p.life<=0)particles.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;ctx.fillStyle=p.col;
    if(p.type==='text'){
      ctx.font=`bold ${p.size}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.strokeStyle='#000';ctx.lineWidth=3;
      ctx.strokeText(p.text,p.x,p.y);
      ctx.fillText(p.text,p.x,p.y);
    }else if(p.type==='star'){
      drawStar(p.x,p.y,p.size);
    }else if(p.type==='feather'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.beginPath();ctx.ellipse(0,0,p.size,2,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

function drawStar(x,y,r){
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI*2*i/5-Math.PI/2;
    const a2=a+Math.PI/5;
    ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    ctx.lineTo(x+Math.cos(a2)*r*0.4,y+Math.sin(a2)*r*0.4);
  }
  ctx.closePath();ctx.fill();
}

  if(dizzyPct>0||F.dizzyState){
    drawText('DIZZY',W-50,by+bh+30,'bold 10px monospace','#ffdd00','right');
    drawBar(W-65-bw,by+bh+45,bw,8,dizzyPct,'#ffdd00','#333');
  }
  // Spinning stars around opponent when dizzy is building
  if(dizzyPct>0.25&&F.oState!=='kd'){

  for(let i=0;i<3;i++){
    const active=i<F.pKD;
    ctx.fillStyle=active?'#ff3333':'#555';
    ctx.beginPath();ctx.arc(70+i*15,by+bh+10,6,0,Math.PI*2);ctx.fill();

      ctx.strokeStyle='rgba(255,100,100,0.7)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(70+i*15,by+bh+10,7,0,Math.PI*2);ctx.stroke();
    }

  for(let i=0;i<3;i++){
    const active=i<F.oKD;
    ctx.fillStyle=active?'#ff3333':'#555';
    ctx.beginPath();ctx.arc(W-70-i*15,by+bh+10,6,0,Math.PI*2);ctx.fill();
    if(active){
      ctx.strokeStyle='rgba(255,100,100,0.7)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(W-70-i*15,by+bh+10,7,0,Math.PI*2);ctx.stroke();

  const py=632;
  drawText('POW',12,py+8,'bold 10px monospace','#ffaa00','left');
  const powPct=F.power/F.maxPower;
  const powCol=F.superReady?'#ffdd00':powPct>0.7?'#ffaa00':powPct>0.4?'#88aa00':'#448800';

  // Draw background bar
  ctx.fillStyle='#333';ctx.fillRect(42,py,180,14);
  // Draw fill bar
  ctx.fillStyle=powCol;ctx.fillRect(42,py,180*powPct,14);
  // Draw segmented marks (5 segments)
  ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1;
  for(let i=1;i<5;i++){
    const mx=42+180*i/5;
    ctx.beginPath();ctx.moveTo(mx,py);ctx.lineTo(mx,py+14);ctx.stroke();
  }
  // Pulsing glow around S when super ready
  if(F.superReady){
    const glow=0.3+Math.sin(stateTime*4)*0.3;
    ctx.globalAlpha=glow;
    ctx.fillStyle='rgba(255,221,0,0.6)';
    ctx.fillRect(228,py-3,20,20);
    ctx.globalAlpha=1;

  }

  // Stamina bar
  const sy=650;
  drawText('STA',12,sy+8,'bold 10px monospace','#4499ff','left');
  drawBar(42,sy,180,10,Math.max(0,F.stamina/100),'#4499ff');
}

// ---------------------------------------------------------------------------
// OPPONENT AI
// ---------------------------------------------------------------------------
function aiUpdate(dt){
  if(!F||F.oState==='kd')return;

  // Counter window countdown
  if(F.counterWindow>0)F.counterWindow-=dt;

  // DIZZY STATE — opponent completely helpless
  if(F.dizzyState){
    F.dizzyTime-=dt;
    F.oState='dizzy';
    if(F.dizzyTime<=0){
      F.dizzyState=false;F.dizzy=0;F.oState='idle';
    }
    return; // can't do anything while dizzy
  }

  // Recover from stun
  if(F.aiStunned){F.aiStunTime-=dt;if(F.aiStunTime<=0){F.aiStunned=false;F.oState='idle';F.aiCombo=[];F.aiComboIdx=0;}return;}

  // Recover from dodge
  if(F.aiDodgeTime>0){
    F.aiDodgeTime-=dt;
    if(F.aiDodgeTime<=0){F.oState='idle';}
    return; // can't do anything while dodging
  }

  // Phase check
  F.aiPhase=F.oH/F.maxOH<0.5?1:0;

  // Check if dizzy meter is full
  if(F.dizzy>=F.dizzyMax){
    F.dizzyState=true;F.dizzyTime=2.5;F.dizzy=0;
    F.oState='dizzy';F.aiTell=false;F.aiAttacking=false;
    F.aiCombo=[];F.aiComboIdx=0;
    addTextEffect('★ DIZZY! ★',W/2,250,'#ffdd00');
    return;
  }

  // --- OPPONENT DEFENSE: Guard stance & active dodging ---
  // Between combos, opponent guards and may dodge player attacks
  if(F.oState==='idle'&&!F.aiAttacking&&!F.aiTell){
    // Set guard stance — alternates high/low every ~1.2s to create openings
    // Faster opponents switch guard more quickly
    const guardSpeed = 0.6 + (F.opp.spd * 0.08);
    const guardCycle=Math.floor(stateTime*guardSpeed)%2;
    F.aiGuardZone=guardCycle===0?'high':'low';

    // React to player attacks — dodge (checked once per attack via pTime < 0.05)
    if((F.pState==='jabL'||F.pState==='jabR'||F.pState==='hookL'||F.pState==='hookR')&&F.pTime<0.05){
      const dodgeChance=0.12+(F.opp.spd*0.03)+(F.aiPhase*0.08);
      if(Math.random()<dodgeChance){
        const dodgeType=Math.random();
        if(dodgeType<0.4){
          F.oState='dodge_l';F.aiDodgeTime=0.3;
        }else if(dodgeType<0.8){
          F.oState='dodge_r';F.aiDodgeTime=0.3;
        }else{
          F.oState='duck';F.aiDodgeTime=0.25;
        }
        addTextEffect('DODGE!',W/2,280,'#88bbff');
        return;
      }
    }
  }

  // Special attack — only when low health, after many attacks, once per round
  if(F.aiPhase===1&&!F.aiSpecialUsed&&F.aiAttackCount>=(8+F.oppIdx*2)&&F.oState==='idle'&&F.aiCombo.length===0){
    F.aiSpecialUsed=true;
    F.aiCombo=[{tell:0.8,type:'special',zone:'high'}];
    F.aiComboIdx=0;
    startNextComboHit();
    return;
  }

  // AI attack timer
  F.aiTimer-=dt;
  if(F.aiTimer<=0&&F.oState==='idle'){
    if(F.aiCombo.length>0&&F.aiComboIdx<F.aiCombo.length){
      startNextComboHit();
    }else if(F.aiCombo.length===0){
      const combos=getOpponentCombos(F.oppIdx);
      const combo=combos[Math.floor(Math.random()*combos.length)];
      F.aiCombo=combo;F.aiComboIdx=0;
      startNextComboHit();
    }
  }

  // Process tell phase
  if(F.aiTell){
    F.aiTellTime-=dt;
    F.oState='tell';
    if(F.aiTellTime<=0){
      F.aiTell=false;
      executeAIAttack();
    }
  }

  // Process attack animation — chain to next combo hit when done
  if(F.aiAttacking){
    F.aiAttackTime-=dt;
    if(F.aiAttackTime<=0){
      F.aiAttacking=false;
      F.aiComboIdx++;
      if(F.aiComboIdx<F.aiCombo.length){
        F.oState='idle';
        const chainDelay=F.oppIdx<4?0.15+(3-F.oppIdx)*0.08:0.08; // slower chain for early opponents
        F.aiTimer=chainDelay;
      }else{
        // Combo finished — pause before next combo (longer for early opponents)
        F.aiCombo=[];F.aiComboIdx=0;
        F.oState='idle';
        const earlyBonus=Math.max(0,(4-F.oppIdx)*0.2); // +0.8s for opp 0, +0.6 for opp 1, etc, 0 for opp 4+
        const pause=0.4-(F.oppIdx*0.02)-(F.aiPhase*0.1)+earlyBonus;
        F.aiTimer=Math.max(0.15,pause+Math.random()*0.25);
      }
    }
  }
}

function startNextComboHit(){
  const hit=F.aiCombo[F.aiComboIdx];
  if(!hit)return;
  F.aiTell=true;
  F.aiTellTime=hit.tell;
  F.aiAttackType=hit.type;
  F.aiAttackZone=hit.zone||'high';
  F.aiAttackCount++;
  F.oThrown++;
  if(hit.type==='feint'){F.aiFeinting=true;}
}

function getOpponentCombos(idx){
  // Each combo is an array of attacks chained rapidly. Tells are SHORT (0.25-0.5s).
  // Super Punch-Out!! style: opponents throw 2-5 hit combos constantly.
  // side: 'l' = opponent attacks from left, 'r' = from right (for counter timing)
  const phase=F.aiPhase;
  const combos=[
    // El Gallo — very slow, deliberate jab combos (tutorial opponent)
    [
      [{tell:0.9,type:'jab',zone:'high',side:'r'},{tell:0.8,type:'jab',zone:'high',side:'l'}],
      [{tell:0.9,type:'jab',zone:'high',side:'l'},{tell:0.85,type:'body_blow',zone:'low',side:'r'}],
      [{tell:1.0,type:'jab',zone:'high',side:'r'},{tell:0.8,type:'jab',zone:'high',side:'l'},{tell:0.9,type:'body_blow',zone:'low',side:'r'}],
    ],
    // Nok Chai — slow alternating high/low, teaches duck timing
    [
      [{tell:0.75,type:'jab',zone:'high',side:'r'},{tell:0.7,type:'body_blow',zone:'low',side:'l'},{tell:0.8,type:'jab',zone:'high',side:'r'}],
      [{tell:0.8,type:'body_blow',zone:'low',side:'l'},{tell:0.7,type:'hook',zone:'high',side:'r'}],
      [{tell:0.75,type:'jab',zone:'high',side:'l'},{tell:0.8,type:'uppercut',zone:'high',side:'r'}],
    ],
    // Rayo — medium speed hook combos, teaches dodge timing
    [
      [{tell:0.6,type:'hook',zone:'high',side:'r'},{tell:0.6,type:'hook',zone:'high',side:'l'}],
      [{tell:0.65,type:'body_blow',zone:'low',side:'l'},{tell:0.6,type:'hook',zone:'high',side:'r'},{tell:0.65,type:'body_blow',zone:'low',side:'l'}],
      [{tell:0.55,type:'jab',zone:'high',side:'r'},{tell:0.55,type:'jab',zone:'high',side:'l'},{tell:0.65,type:'hook',zone:'high',side:'r'}],
    ],
    // Garuda — medium body specialist, teaches counter windows
    [
      [{tell:0.55,type:'body_blow',zone:'low',side:'l'},{tell:0.5,type:'body_blow',zone:'low',side:'r'},{tell:0.65,type:'uppercut',zone:'high',side:'l'}],
      [{tell:0.5,type:'jab',zone:'high',side:'r'},{tell:0.55,type:'body_blow',zone:'low',side:'l'},{tell:0.5,type:'body_blow',zone:'low',side:'r'}],
      [{tell:0.65,type:'uppercut',zone:'high',side:'r'},{tell:0.55,type:'body_blow',zone:'low',side:'l'}],
    ],
    // Sinigang — haymaker combos
    [
      [{tell:0.5,type:'hook',zone:'high',side:'r'},{tell:0.5,type:'hook',zone:'high',side:'l'},{tell:0.6,type:'uppercut',zone:'high',side:'r'}],
      [{tell:0.4,type:'body_blow',zone:'low',side:'l'},{tell:0.5,type:'hook',zone:'high',side:'r'}],
      [{tell:0.45,type:'jab',zone:'high',side:'r'},{tell:0.45,type:'jab',zone:'high',side:'l'},{tell:0.5,type:'hook',zone:'high',side:'r'},{tell:0.5,type:'hook',zone:'high',side:'l'}],
    ],
    // Adobo — slow but devastating
    [
      [{tell:0.6,type:'uppercut',zone:'high',side:'r'},{tell:0.5,type:'body_blow',zone:'low',side:'l'}],
      [{tell:0.5,type:'hook',zone:'high',side:'l'},{tell:0.5,type:'hook',zone:'high',side:'r'},{tell:0.6,type:'uppercut',zone:'high',side:'l'}],
      [{tell:0.5,type:'body_blow',zone:'low',side:'r'},{tell:0.5,type:'body_blow',zone:'low',side:'l'},{tell:0.5,type:'uppercut',zone:'high',side:'r'}],
    ],
    // Kai — adaptive fast combos
    [
      [{tell:0.3,type:'jab',zone:'high',side:'r'},{tell:0.3,type:'body_blow',zone:'low',side:'l'},{tell:0.35,type:'hook',zone:'high',side:'r'},{tell:0.4,type:'uppercut',zone:'high',side:'l'}],
      [{tell:0.3,type:'jab',zone:'high',side:'l'},{tell:0.3,type:'jab',zone:'high',side:'r'},{tell:0.35,type:'body_blow',zone:'low',side:'l'}],
      [{tell:0.35,type:'hook',zone:'high',side:'r'},{tell:0.3,type:'body_blow',zone:'low',side:'l'},{tell:0.35,type:'hook',zone:'high',side:'r'}],
    ],
    // Lechon — heavy 2-hit combos
    [
      [{tell:0.5,type:'hook',zone:'high',side:'r'},{tell:0.55,type:'uppercut',zone:'high',side:'l'}],
      [{tell:0.45,type:'body_blow',zone:'low',side:'l'},{tell:0.5,type:'hook',zone:'high',side:'r'},{tell:0.5,type:'body_blow',zone:'low',side:'l'}],
      [{tell:0.5,type:'uppercut',zone:'high',side:'r'},{tell:0.45,type:'body_blow',zone:'low',side:'l'},{tell:0.5,type:'uppercut',zone:'high',side:'r'}],
    ],
    // Nalani — feint-heavy mind games
    [
      [{tell:0.35,type:'feint',zone:'high',side:'r'},{tell:0.3,type:'body_blow',zone:'low',side:'l'},{tell:0.35,type:'hook',zone:'high',side:'r'}],
      [{tell:0.3,type:'feint',zone:'low',side:'l'},{tell:0.35,type:'jab',zone:'high',side:'r'},{tell:0.3,type:'jab',zone:'high',side:'l'}],
      [{tell:0.4,type:'jab',zone:'high',side:'r'},{tell:0.3,type:'feint',zone:'high',side:'l'},{tell:0.4,type:'uppercut',zone:'high',side:'r'}],
    ],
    // Makoa — relentless 4-5 hit combos
    [
      [{tell:0.3,type:'jab',zone:'high',side:'r'},{tell:0.3,type:'body_blow',zone:'low',side:'l'},{tell:0.3,type:'hook',zone:'high',side:'r'},{tell:0.35,type:'uppercut',zone:'high',side:'l'}],
      [{tell:0.3,type:'body_blow',zone:'low',side:'l'},{tell:0.3,type:'body_blow',zone:'low',side:'r'},{tell:0.3,type:'hook',zone:'high',side:'l'},{tell:0.3,type:'hook',zone:'high',side:'r'},{tell:0.4,type:'uppercut',zone:'high',side:'l'}],
      [{tell:0.35,type:'hook',zone:'high',side:'r'},{tell:0.3,type:'jab',zone:'high',side:'l'},{tell:0.35,type:'body_blow',zone:'low',side:'r'},{tell:0.4,type:'uppercut',zone:'high',side:'l'}],
    ]
  ];
  let pool=combos[idx]||combos[0];
  // Difficulty scaling — later opponents have tighter reaction windows
  // idx 0 (El Gallo) = 1.0x, idx 9 (Mabuhay) = 0.65x tell speed
  const diffScale=1.0-idx*0.035;
  pool=pool.map(combo=>combo.map(h=>({...h,tell:h.tell*diffScale})));
  // Phase 1 (low health) — even faster on top of that
  if(phase===1){
    pool=pool.map(combo=>combo.map(h=>({...h,tell:h.tell*0.82})));
  }
  return pool;
}

function executeAIAttack(){
  if(F.aiFeinting){
    F.aiFeinting=false;F.oState='idle';
    // Advance combo past the feint
    F.aiComboIdx++;
    if(F.aiComboIdx<F.aiCombo.length){F.aiTimer=0.12;}
    else{F.aiCombo=[];F.aiComboIdx=0;F.aiTimer=0.3;}
    return;
  }

  F.aiAttacking=true;F.aiAttackTime=0.35;

  const type=F.aiAttackType;
  const zone=F.aiAttackZone;
  F.oState=type==='special'?'uppercut':type;

  if(type==='special'){
    specialCut={active:true,timer:0,phase:0,name:F.opp.special,
      attacker:'opponent',dmg:15*(F.opp.pow/6),stars:0};
    state=ST.SPECIAL_CUT;stateTime=0;
    F.oState='special';F.oTime=0;
    return;
  }

  // Check player defense
  let dodged=false, blocked=false;

  // Dodge left/right avoids EVERYTHING
  if(F.pState==='dodge_l'||F.pState==='dodge_r'){
    dodged=true;
  }
  // Duck avoids HIGH attacks (jab, hook) but NOT uppercut or body_blow
  if(F.pState==='duck'||F.pState==='block'){
    if(zone==='high' && type!=='uppercut') dodged=true;
    // uppercuts and body_blows still hit you while ducking
  }
  if(F.pState==='idle'){
    // Idle = low guard — blocks body blows
    if(zone==='low') blocked=true;
  }

  if(dodged){
    SFX.miss();
    // Successful dodge opens counter window
    F.counterWindow=0.6;
    addTextEffect('DODGE!',W/2,400,'#44ff44');
    return;
  }

  // Calculate damage
  let dmg=0;
  const powMult=F.opp.pow/6;
  if(type==='jab')dmg=5*powMult;
  else if(type==='hook')dmg=7*powMult;
  else if(type==='body_blow')dmg=6*powMult;
  else if(type==='uppercut')dmg=10*powMult;
  else if(type==='special')dmg=15*powMult;

  if(blocked){
    dmg*=0.2;
    SFX.block();
    F.power=Math.max(0,F.power-5); // blocking drains a little power
    addTextEffect('BLOCK!',W/2,400,'#88bbff');
  }else{
    // Clean hit on player
    F.oLanded++;
    F.pState='hit';F.pTime=0;F.pHitStun=0.35;
    F.power=Math.max(0,F.power-10); // getting hit drains power meter
    if(type==='hook')SFX.hook();
    else if(type==='uppercut'||type==='special')SFX.uppercut();
    else SFX.jab();
    addHitEffect(W/2+Math.random()*40-20,420+Math.random()*30,type==='uppercut');
    if(navigator.vibrate)navigator.vibrate(type==='uppercut'?80:30);
    F.shakeTime=type==='uppercut'?0.2:0.1;F.shakeAmt=type==='uppercut'?6:3;
  }

  F.pH-=dmg;F.oDmgDealt+=dmg;
  if(F.round<=3)F.oRoundDmg[F.round-1]+=dmg;
  if(F.pH<=0){F.pH=0;playerKnockdown();}
}

// PLAYER ACTIONS
// ---------------------------------------------------------------------------
let inputCooldown=0;
let lastInputState={};

function processPlayerInput(dt){
  if(!F||F.pState==='kd')return;

  F.pHitStun-=dt;
  inputCooldown-=dt;
  if(F.pHitStun>0)return;

  const inp=getInput();

  // Defense ALWAYS available — even during attack cooldown (SPO lets you cancel into dodge)
  if(inp.dodgeL&&F.pState!=='dodge_l'){
    F.pState='dodge_l';F.pDir=-1;F.pTime=0;inputCooldown=0.2;
    return;
  }
  if(inp.dodgeR&&F.pState!=='dodge_r'){
    F.pState='dodge_r';F.pDir=1;F.pTime=0;inputCooldown=0.2;
    return;
  }
  // Duck — avoids high attacks but vulnerable to uppercuts and body blows
  if((inp.duck||inp.block)&&F.pState!=='duck'){
    F.pState='duck';F.pTime=0;inputCooldown=0.18;
    return;
  }

  // Attack inputs locked by cooldown
  if(inputCooldown>0)return;

  // Stamina check — hooks need more, jabs can squeeze through
  const nextIsHook=(inp.hookL&&!lastInputState.hookL)||(inp.hookR&&!lastInputState.hookR);
  const minStam=nextIsHook?5:1;
  if(F.stamina<minStam){addTextEffect('NO STAMINA!',W/2,500,'#ff6666');SFX.block();F.pState='idle';return;}

  // Special — uses power meter (like Super Punch-Out!! Knockout Punch)
  if(inp.special&&F.superReady){
    specialCut={active:true,timer:0,phase:0,name:F.plr.special||'Super Punch',
      attacker:'player',dmg:18*(F.plr.pow/6),stars:0};
    state=ST.SPECIAL_CUT;stateTime=0;
    F.pState='special';F.pTime=0;
    F.power=0;F.superReady=false;
    SFX.star();
    return;
  }

  // Jab reset timer — resets jab count if you mix in other attacks or wait
  if(F.jabResetTimer>0){F.jabResetTimer-=dt;if(F.jabResetTimer<=0)F.jabCount=0;}

  // Attacks — LEFT JAB (fastest, weakest, targets HIGH)
  if(inp.jabL&&!lastInputState.jabL){
    F.jabCount++;F.jabResetTimer=0.8;
    const jabPenalty=Math.min(F.jabCount-1,5);
    F.pState='jabL';F.pTime=0;F.pDir=-1;inputCooldown=0.18+jabPenalty*0.03;F.pThrown++;F.stamina=Math.max(0,F.stamina-(3+jabPenalty));
    attemptPlayerHit('jabL',3*(F.plr.pow/6));
    return;
  }

  // RIGHT JAB (slightly slower/stronger, targets HIGH)
  if(inp.jabR&&!lastInputState.jabR){
    F.jabCount++;F.jabResetTimer=0.8;
    const jabPenalty=Math.min(F.jabCount-1,5);
    F.pState='jabR';F.pTime=0;F.pDir=1;inputCooldown=0.22+jabPenalty*0.03;F.pThrown++;F.stamina=Math.max(0,F.stamina-(4+jabPenalty));
    attemptPlayerHit('jabR',4*(F.plr.pow/6));
    return;
  }

  // LEFT HOOK (power punch, blocked unless counter)
  if(inp.hookL&&!lastInputState.hookL){
    F.jabCount=0;
    F.pState='hookL';F.pTime=0;F.pDir=-1;inputCooldown=0.32;F.pThrown++;F.stamina=Math.max(0,F.stamina-8);
    attemptPlayerHit('hookL',7*(F.plr.pow/6));
    return;
  }

  // RIGHT HOOK (power punch, blocked unless counter)
  if(inp.hookR&&!lastInputState.hookR){
    F.jabCount=0;
    F.pState='hookR';F.pTime=0;F.pDir=1;inputCooldown=0.34;F.pThrown++;F.stamina=Math.max(0,F.stamina-9);
    attemptPlayerHit('hookR',8*(F.plr.pow/6));
    return;
  }

  // Return to idle — dodges auto-expire, duck stays held
  if(F.pTime>0.25&&(F.pState==='dodge_l'||F.pState==='dodge_r')){
    F.pState='idle';
  }
  if(F.pTime>0.14&&(F.pState==='jabL'||F.pState==='jabR'||F.pState==='hookL'||F.pState==='hookR'||F.pState==='special'||F.pState==='rapid')){
    F.pState='idle';
  }
  if(!inp.block&&!inp.duck&&(F.pState==='block'||F.pState==='duck')){F.pState='idle';}

  lastInputState={...inp};
}

function attemptPlayerHit(type,dmg){
  // Miss if opponent dodging
  if(F.oState==='dodge_l'||F.oState==='dodge_r'){
    SFX.miss();addTextEffect('MISS',W/2,280,'#888888');return;
  }
  if(F.oState==='duck'&&(type==='jabL'||type==='jabR'||type==='hookL'||type==='hookR')){
    // Duck only avoids high attacks (jabs)
    if(type==='jabL'||type==='jabR'){
      SFX.miss();addTextEffect('MISS',W/2,280,'#888888');return;
    }
    // Hooks hit through duck
  }

  // --- SUPER ARMOR: Opponent CANNOT be interrupted during attack animations ---
  if(F.aiAttacking){
    SFX.block();
    addTextEffect('DEFLECT!',W/2,280,'#ff8888');
    F.power=Math.max(0,F.power-3);
    return;
  }

  // Counter during tell — HOOKS ONLY (jabs bounce off)
  if(F.aiTell){
    if(type==='jabL'||type==='jabR'){
      // Jabs during tell bounce off — opponent has guard up
      SFX.block();
      addTextEffect('DEFLECT!',W/2,280,'#ff8888');
      return;
    }
    // Hooks can ALWAYS counter during tell!
    // But correct side gives bonus damage and extra dizzy
    const isLeftHook = type==='hookL';
    const isRightHook = type==='hookR';
    const currentHit = F.aiCombo[F.aiComboIdx];
    const correctSide = (currentHit?.side==='r' && isLeftHook) || (currentHit?.side==='l' && isRightHook);

    let counterDmg = dmg * 1.3;
    let extraDizzy = 20;
    if(correctSide){
      counterDmg = dmg * 1.5; // bonus for correct side
      extraDizzy = 30; // extra dizzy bonus
    }

    F.power=Math.min(F.maxPower,F.power+25);
    F.aiTell=false;F.aiStunned=true;F.aiStunTime=0.5;
    F.aiCombo=[];F.aiComboIdx=0;
    F.oState='hit';F.oTime=0;
    F.pLanded++;
    F.dizzy = Math.min(F.dizzyMax, F.dizzy + extraDizzy);
    SFX.star();
    addHitEffect(W/2+Math.random()*30-15,280+Math.random()*30,true);
    addTextEffect(correctSide?'PERFECT COUNTER!':'COUNTER!',W/2,250,'#ffdd00');
    if(navigator.vibrate)navigator.vibrate(60);
    F.shakeTime=0.15;F.shakeAmt=5;F.counterFlash=0.2;
    F.oH-=counterDmg;F.pDmgDealt+=counterDmg;
    if(F.round<=3)F.pRoundDmg[F.round-1]+=counterDmg;
    if(F.oH<=0){F.oH=0;opponentKnockdown();}
    if(F.power>=F.maxPower)F.superReady=true;
    return;
  }

  // Stunned opponent — limited free hits
  if(F.aiStunned){
    F.oState='hit';F.oTime=0;
    F.pLanded++;
    F.power=Math.min(F.maxPower,F.power+5);
    if(type==='jabL'||type==='jabR')SFX.jab();
    else SFX.hook();
    addHitEffect(W/2+Math.random()*30-15,280+Math.random()*30,type==='hookL'||type==='hookR');
    if(navigator.vibrate)navigator.vibrate(20);
    F.shakeTime=0.08;F.shakeAmt=2;
    F.oH-=dmg*0.7;
    F.pDmgDealt+=dmg*0.7;
    if(F.round<=3)F.pRoundDmg[F.round-1]+=dmg*0.7;
    if(F.oH<=0){F.oH=0;opponentKnockdown();}
    if(F.power>=F.maxPower)F.superReady=true;
    return;
  }

  // Dodge-counter window
  if(F.counterWindow>0){
    F.oState='hit';F.oTime=0;
    F.pLanded++;
    F.power=Math.min(F.maxPower,F.power+15);
    if(type==='jabL'||type==='jabR')SFX.jab();
    else SFX.hook();
    addHitEffect(W/2+Math.random()*30-15,280+Math.random()*30,type==='hookL'||type==='hookR');
    if(navigator.vibrate)navigator.vibrate((type==='hookL'||type==='hookR')?50:20);
    F.shakeTime=(type==='hookL'||type==='hookR')?0.12:0.06;F.shakeAmt=(type==='hookL'||type==='hookR')?4:2;
    F.dizzy = Math.min(F.dizzyMax, F.dizzy + 15); // dodge-counter adds some dizzy
    F.oH-=dmg;F.pDmgDealt+=dmg;
    if(F.round<=3)F.pRoundDmg[F.round-1]+=dmg;
    if(F.oH<=0){F.oH=0;opponentKnockdown();}
    if(F.power>=F.maxPower)F.superReady=true;
    return;
  }

  // --- HOOKS: blocked ~60% unless in a counter window ---
  const isHook = (type==='hookL'||type==='hookR');
  if(isHook && (F.oState==='idle') && !F.aiAttacking && !F.aiTell){
    if(Math.random() < 0.55 + F.opp.def*0.02){
      SFX.block();
      addTextEffect('BLOCK!',W/2,280,'#aaaaaa');
      F.power=Math.max(0,F.power-3);
      return;
    }
  }

  // Zone-based blocking — jabs blocked when guard matches zone
  const attackZone = isHook ? 'low' : 'high';

  // Opponent blocks jabs during idle
  if(!isHook && (F.oState==='idle') && !F.aiAttacking && !F.aiTell){
    if(attackZone === F.aiGuardZone){
      SFX.block();
      addTextEffect('BLOCK!',W/2,280,'#aaaaaa');
      F.power=Math.max(0,F.power-3);
      if(Math.random() < 0.35 + (F.opp.def * 0.04)){
        F.aiTimer = 0.12;
      }
      return;
    }
  }

  // Hit lands — apply damage and effects
  F.pLanded++;
  const powerGain = isHook ? 6 : 3;
  F.power=Math.min(F.maxPower,F.power+powerGain);

  if(type==='jabL'||type==='jabR')SFX.jab();
  else SFX.hook();
  addHitEffect(W/2+Math.random()*30-15,280+Math.random()*30,isHook);
  if(navigator.vibrate)navigator.vibrate(isHook?40:15);

  // Jabs: quick chip damage, steady dizzy buildup
  if(!isHook){
    F.shakeTime=0.04;F.shakeAmt=2;
    const jdmg=dmg*0.75;
    F.oH-=jdmg;F.pDmgDealt+=jdmg;
    if(F.round<=3)F.pRoundDmg[F.round-1]+=jdmg;
    F.dizzy = Math.min(F.dizzyMax, F.dizzy + 3);
  }else{
    // Hooks: big damage, stagger, good dizzy (reward for landing raw)
    F.shakeTime=0.1;F.shakeAmt=3;
    if(F.oState==='idle'){F.oState='hit';F.oTime=0;}
    F.oH-=dmg;F.pDmgDealt+=dmg;
    if(F.round<=3)F.pRoundDmg[F.round-1]+=dmg;
    F.dizzy = Math.min(F.dizzyMax, F.dizzy + 5);
  }

  if(F.oH<=0){F.oH=0;opponentKnockdown();}
  if(F.power>=F.maxPower)F.superReady=true;
}

// ---------------------------------------------------------------------------
// KNOCKDOWNS
// ---------------------------------------------------------------------------
function playerKnockdown(){
  F.pKD++;F.pState='kd';F.pTime=0;
  SFX.kd();F.shakeTime=0.5;F.shakeAmt=12;
  if(F.pKD>=3){specialCut.active=false;endFight('opponent','TKO');return;}
  state=ST.KD;stateTime=0;F.kdTarget='player';F.kdCount=10;F.kdMash=0;F.kdMashNeeded=5;
  specialCut.active=false;tapMashCount=0;
}

function opponentKnockdown(){
  F.oKD++;F.oState='kd';F.oTime=0;
  SFX.kd();SFX.crowd();F.shakeTime=0.5;F.shakeAmt=12;
  if(F.oKD>=3){specialCut.active=false;F.pState='idle';endFight('player','TKO');return;}
  state=ST.KD;stateTime=0;F.kdTarget='opponent';F.kdCount=10;F.kdMash=0;F.lastKdMash=0;
  specialCut.active=false;F.pState='idle';F.pTime=0;inputCooldown=0;
}

function updateKnockdown(dt){
  F.kdCount-=dt;

  if(F.kdTarget==='player'){
    // Player must mash to get up — or auto-get-up at count 3
    F.kdMash=tapMashCount;
    if(F.kdMash>=F.kdMashNeeded||F.kdCount<=3){
      F.pState='idle';F.pH=Math.max(F.pH,F.kdMash>=F.kdMashNeeded?80:40);state=ST.FIGHT;stateTime=0;tapMashCount=0;return;
    }
  }else{
    // Player can mash to recover health during opponent's knockdown
    if(tapMashCount > F.lastKdMash){
      const newTaps = tapMashCount - F.lastKdMash;
      F.pH = Math.min(100, F.pH + newTaps * 2); // 2 HP per tap
      F.lastKdMash = tapMashCount;
    }
    // Opponent gets up based on health remaining (harder opponents get up easier)
    F.kdMash+=dt*(2+F.opp.def*0.5);
    if(F.kdMash>=5){
      F.oState='idle';F.oH=Math.max(F.oH,F.maxOH*0.8);
      F.aiStunned=false;state=ST.FIGHT;stateTime=0;return;
    }
  }

  if(F.kdCount<=0){
    if(F.kdTarget==='player')endFight('opponent','KO');
    else endFight('player','KO');
  }

  // Safety: if KD has lasted over 12 seconds somehow, force resolution
  if(stateTime>12&&state===ST.KD){
    if(F.kdTarget==='player')endFight('opponent','KO');
    else endFight('player','KO');
  }
}

// ---------------------------------------------------------------------------
// ROUND / FIGHT MANAGEMENT
// ---------------------------------------------------------------------------
function endRound(){
  state=ST.ROUND_END;stateTime=0;
  SFX.bell();
  if(F.round>=3){
    // Judge decision
    const pTotal=F.pRoundDmg.reduce((a,b)=>a+b,0);
    const oTotal=F.oRoundDmg.reduce((a,b)=>a+b,0);
    if(pTotal>=oTotal)endFight('player','Decision');
    else endFight('opponent','Decision');
  }
}

function startNextRound(){
  F.round++;F.timer=60;
  F.power=0;F.superReady=false;F.stamina=100;
  F.counterWindow=0;
  F.dizzy=0;F.dizzyState=false;F.dizzyTime=0;
  F.aiAttackCount=0;F.aiFeinting=false;
  F.pState='idle';F.pTime=0;F.pDir=0;
  F.oState='idle';F.oTime=0;F.oDir=0;
  F.aiTimer=0.6;F.aiTell=false;F.aiTellTime=0;
  F.aiAttacking=false;F.aiAttackTime=0;
  F.aiStunned=false;F.aiStunTime=0;
  F.aiCombo=[];F.aiComboIdx=0;
  F.aiDodgeTime=0;F.aiGuardZone='high';
  F.jabCount=0;F.jabResetTimer=0;
  F.pCooldown=0;F.pHitStun=0;
  F.shakeTime=0;F.shakeAmt=0;
  inputCooldown=0;
  lastInputState={};
  stateTime=0;
  state=ST.FIGHT;
  SFX.bell();
}

function endFight(winner,reason){
  F.winner=winner;F.resultReason=reason;
  state=ST.RESULT;stateTime=0;
  if(winner==='player'){SFX.crow();SFX.crowd();}
  stopMusic();
}

function consumeTap(){
  if(touch.taps.length>0){
    const t=touch.taps.shift();
    return t;
  }
  return null;
}

function tapInArea(tap,x,y,w,h){
  return tap&&tap.x>=x&&tap.x<=x+w&&tap.y>=y&&tap.y<=y+h;
}

// ---------------------------------------------------------------------------
function drawTitle(){
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a0a0a');g.addColorStop(0.5,'#3a1515');g.addColorStop(1,'#1a0a0a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Animated floating feathers
  for(let i=0;i<4;i++){
    const x=W*(0.2+i*0.2)+Math.sin(stateTime+i)*30;
    const y=150+i*150+Math.cos(stateTime*0.8+i)*40;
    ctx.save();
    ctx.globalAlpha=0.15+Math.sin(stateTime+i)*0.1;
    ctx.fillStyle='#ffddaa';
    ctx.translate(x,y);ctx.rotate(stateTime*0.5+i);
    ctx.beginPath();ctx.ellipse(0,0,15,5,0,0,Math.PI*2);ctx.fill();

function drawFight(){
  if(!F)return;

  // Screen shake
  ctx.save();
  if(F.shakeTime>0){
    ctx.translate(Math.sin(stateTime*50)*F.shakeAmt,Math.cos(stateTime*50)*F.shakeAmt*0.5);
  }

  // Pen
  drawPen(F.oppIdx);

  // Subtle animated vignette for dramatic atmosphere
  const vignetteGrad=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,Math.hypot(W,H));
  vignetteGrad.addColorStop(0,'rgba(0,0,0,0)');vignetteGrad.addColorStop(1,'rgba(0,0,0,0.15)');
  ctx.save();ctx.fillStyle=vignetteGrad;ctx.fillRect(0,0,W,H);ctx.restore();

  // Opponent rooster
  drawRoosterFront(W/2,280,1.8*(F.opp.scale||1),F.opp.col,F.oState,F.oTime,F.opp.trait);

  // Player rooster
  drawRoosterBack(W/2,460,1.6,F.plr.col,F.pState,F.pTime,F.pState==='special'?-1:undefined);

  // Particles
  drawParticles();

  ctx.restore();

  // HUD
  drawHUD();

  // Controls overlay
  drawControls();

  // Stun indicator
  if(F.aiStunned){
    ctx.globalAlpha=0.5+Math.sin(stateTime*10)*0.3;
    drawText('★ STUNNED ★',W/2,220,'bold 20px monospace','#ffdd00','center',true);
    ctx.globalAlpha=1;
  }

  // Guard zone indicator — larger shield with glow
  if(F.oState==='idle'&&!F.aiAttacking&&!F.aiTell&&!F.aiStunned){
    const gz=F.aiGuardZone;
    const gAlpha=0.45+Math.sin(stateTime*3)*0.15;
    ctx.save();
    ctx.globalAlpha=gAlpha;
    // Shield shape near opponent
    const gy=gz==='high'?250:310;
    const shieldCol=gz==='high'?'#4488ff':'#ff8844';
    // Glow effect
    ctx.shadowColor=shieldCol;ctx.shadowBlur=15;
    ctx.fillStyle=shieldCol;
    // Draw shield shape (path)
    ctx.beginPath();
    ctx.moveTo(W/2+80,gy-22);ctx.lineTo(W/2+95,gy-10);ctx.lineTo(W/2+95,gy+15);
    ctx.arc(W/2+80,gy+15,15,0,Math.PI,true);ctx.lineTo(W/2+65,gy-10);ctx.closePath();
    ctx.fill();
    ctx.shadowColor='transparent';
    ctx.globalAlpha=gAlpha+0.3;
    drawText(gz==='high'?'▲':'▼',W/2+80,gy+2,'bold 16px monospace','#fff','center',false);
    ctx.restore();
  }

  // Counter window indicator
  if(F.counterWindow>0){
    ctx.globalAlpha=0.7+Math.sin(stateTime*8)*0.3;
    drawText('▶ COUNTER! ◀',W/2,620,'bold 20px monospace','#44ff44','center',true);
    ctx.globalAlpha=1;
  }

  // ATTACK TELL — big, clear, unmissable danger indicators
  if(F.aiTell){
    const zone=F.aiAttackZone;
    const type=F.aiAttackType;
    const tellProg=1-(F.aiTellTime/(F.aiCombo[F.aiComboIdx]?.tell||0.5)); // 0→1 as tell progresses
    const flash=Math.sin(stateTime*16);
    const urgency=0.3+tellProg*0.7; // gets more intense as tell progresses

    // Pulsing red border — gets stronger as attack approaches
    ctx.save();
    const borderAlpha=urgency*(0.3+flash*0.15);
    ctx.strokeStyle=zone==='high'?'rgba(255,60,60,'+borderAlpha+')':'rgba(255,140,40,'+borderAlpha+')';
    ctx.lineWidth=6+tellProg*6;
    ctx.strokeRect(2,2,W-4,H-4);
    ctx.restore();

    // Danger zone highlight — shade the zone being targeted
    ctx.save();
    if(zone==='high'){
      // Red glow across upper body area
      const grad=ctx.createLinearGradient(0,140,0,350);
      grad.addColorStop(0,'rgba(255,40,40,'+(urgency*0.25)+')');
      grad.addColorStop(0.5,'rgba(255,40,40,'+(urgency*0.15)+')');
      grad.addColorStop(1,'rgba(255,40,40,0)');
      ctx.fillStyle=grad;
      ctx.fillRect(0,140,W,210);
    }else{
      // Orange glow across lower body area
      const grad=ctx.createLinearGradient(0,350,0,520);
      grad.addColorStop(0,'rgba(255,160,40,0)');
      grad.addColorStop(0.3,'rgba(255,160,40,'+(urgency*0.2)+')');
      grad.addColorStop(1,'rgba(255,160,40,'+(urgency*0.1)+')');
      ctx.fillStyle=grad;
      ctx.fillRect(0,350,W,170);
    }
    ctx.restore();

    // Attack type label with icon — large and centered
    ctx.globalAlpha=urgency;
    const labelY=zone==='high'?165:380;
    if(type==='uppercut'){
      drawText('⬆ UPPERCUT',W/2,labelY,'bold 22px monospace','#ff2222','center',true);
      drawText('DODGE ← →',W/2,labelY+25,'bold 14px monospace','#ffffff','center',true);
    }else if(type==='hook'){
      drawText('↪ HOOK',W/2,labelY,'bold 22px monospace','#ff4444','center',true);
      drawText('DUCK ↓ or DODGE ← →',W/2,labelY+25,'bold 14px monospace','#ffffff','center',true);
    }else if(type==='jab'){
      drawText('→ JAB',W/2,labelY,'bold 22px monospace','#ff6644','center',true);
      drawText('DUCK ↓ or DODGE ← →',W/2,labelY+25,'bold 14px monospace','#ffffff','center',true);
    }else if(type==='body_blow'){
      drawText('↘ HOOK',W/2,labelY,'bold 22px monospace','#ff8833','center',true);
      drawText('STAY IDLE or DODGE',W/2,labelY+25,'bold 14px monospace','#ffffff','center',true);
    }else if(type==='feint'){
      drawText('? FEINT',W/2,labelY,'bold 22px monospace','#ff88ff','center',true);
    }else if(type==='special'){
      drawText('⚡ SPECIAL ⚡',W/2,labelY,'bold 24px monospace','#ff0000','center',true);
      drawText('DODGE NOW!',W/2,labelY+28,'bold 16px monospace','#ffdd00','center',true);
    }
    ctx.globalAlpha=1;
  }

  // Flash when opponent is ATTACKING (the strike frame)
  if(F.aiAttacking&&F.aiAttackTime>0.2){
    ctx.save();
    ctx.globalAlpha=0.15;
    ctx.fillStyle=F.aiAttackZone==='high'?'#ff3333':'#ff8833';
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // White flash on counter hits
  if(F.counterFlash>0){
    ctx.globalAlpha=(F.counterFlash/0.2)*0.4;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
}

function drawKnockdown(){
  drawFight();

  // Overlay
  drawRect(0,0,W,H,'rgba(0,0,0,0.4)');

  const count=Math.ceil(F.kdCount);

  // Dramatic scale pulse on count change
  const pulse=Math.sin(stateTime*8)*0.1+1;
  ctx.save();
  ctx.translate(W/2,H/2-50);
  ctx.scale(pulse,pulse);
  ctx.translate(-W/2,-H/2+50);
  drawText(count.toString(),W/2,H/2-50,'bold 120px monospace','#ffdd00','center',true);
  ctx.restore();

  // Radial shockwave ring behind number
  ctx.save();
  const shockwaveAlpha=Math.max(0,1-Math.sin(stateTime*12)*0.3);
  ctx.globalAlpha=shockwaveAlpha;
  ctx.strokeStyle='rgba(255,221,0,0.5)';ctx.lineWidth=2;
  const shockwave=Math.sin(stateTime*12)*30+20;
  ctx.beginPath();ctx.arc(W/2,H/2-50,shockwave,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  if(F.kdTarget==='player'){
    drawText('TAP RAPIDLY TO GET UP!',W/2,H/2+50,'bold 18px monospace','#fff','center',true);
    // Mash meter with animated fill glow
    const pct=Math.min(1,F.kdMash/F.kdMashNeeded);
    ctx.save();
    // Glow behind fill
    if(pct>0){
      ctx.shadowColor='rgba(68,221,68,0.8)';ctx.shadowBlur=10;
      drawBar(W/2-100,H/2+80,200,20,pct,'#44dd44');
      ctx.shadowColor='transparent';
    }
    drawBar(W/2-100,H/2+80,200,20,pct,'#44dd44');
    ctx.restore();
  }else{
    drawText('KNOCKDOWN!',W/2,H/2+50,'bold 24px monospace','#ff4444','center',true);
  }
}

function drawResult(){
  const won=F.winner==='player';

  // Gradient background (victory=gold, defeat=red)
  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  if(won){
    bgGrad.addColorStop(0,'#2a1a0a');bgGrad.addColorStop(0.5,'#3d2817');bgGrad.addColorStop(1,'#1a0f05');
  }else{
    bgGrad.addColorStop(0,'#2a0a0a');bgGrad.addColorStop(0.5,'#3d1515');bgGrad.addColorStop(1,'#1a0505');
  }
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Confetti particles on victory
  if(won){
    for(let i=0;i<8;i++){
      const cx=W*(0.1+i*0.1)+Math.sin(stateTime+i)*40;
      const cy=-50+stateTime*200+i*30;
      if(cy<H){
        ctx.globalAlpha=Math.max(0,1-cy/H);
        ctx.fillStyle=i%3===0?'#ffdd00':i%3===1?'#ff4444':'#44dd44';
        ctx.fillRect(cx,cy,8,8);
      }
    }
    ctx.globalAlpha=1;
  }

  drawText(won?'VICTORY!':'DEFEAT',W/2,80,'bold 48px monospace',won?'#ffdd00':'#ff4444','center',true);
  drawText(F.resultReason,W/2,130,'24px monospace','#aaa','center');

  // Stats with animated count-up
  let y=180;
  const stats=[
    ['Punches Thrown',F.pThrown,F.oThrown],
    ['Punches Landed',F.pLanded,F.oLanded],
    ['Damage Dealt',Math.round(F.pDmgDealt),Math.round(F.oDmgDealt)],
