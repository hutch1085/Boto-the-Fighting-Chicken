  ];
  drawText('YOU',170,y,'bold 14px monospace','#88bbff','center');
  drawText('OPP',370,y,'bold 14px monospace','#ff8888','center');
  y+=30;
  let idx=0;
  for(const [label,pv,ov] of stats){
    drawText(label,W/2,y,'14px monospace','#aaa','center');
    // Animated count-up effect
    const animProg=Math.min(1,stateTime/1.5);
    const pDisplay=Math.floor(pv*animProg);
    const oDisplay=Math.floor(ov*animProg);
    drawText(pDisplay.toString(),170,y,'bold 14px monospace','#fff','center');
    drawText(oDisplay.toString(),370,y,'bold 14px monospace','#fff','center');
    // Divider line between stat rows
    if(idx<stats.length-1){
      ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(50,y+14);ctx.lineTo(W-50,y+14);ctx.stroke();
    }
    y+=28;
    idx++;
  }

  // Opponent preview with spotlight glow
  const opp=ROOSTERS[F.oppIdx+1];
  ctx.save();
  // Spotlight circle
  const spotGrad=ctx.createRadialGradient(W/2,480,0,W/2,480,200);
  spotGrad.addColorStop(0,'rgba(255,221,0,0.15)');spotGrad.addColorStop(1,'rgba(255,221,0,0)');
  ctx.fillStyle=spotGrad;ctx.fillRect(W/2-200,280,400,400);
  ctx.restore();
  drawRoosterFront(W/2,480,1.5*(opp.scale||1),opp.col,won?'kd':'idle',stateTime,opp.trait);

  if(stateTime>1.5){
    if(won){
      drawRRect(W/2-100,650,200,55,12,'#339933');
      drawText('CONTINUE',W/2,677,'bold 20px monospace','#fff','center');
    }else{
      drawRRect(W/2-100,650,200,55,12,'#cc3333');
      drawText('RETRY',W/2,677,'bold 20px monospace','#fff','center');
    }
    drawRRect(W/2-100,720,200,50,10,'#555');
    drawText('QUIT',W/2,745,'bold 18px monospace','#fff','center');
  }
}

function update(dt){
  stateTime+=dt;
  updateParticles(dt);

  // Auto-recover states
  if(F){
    F.pTime+=dt;F.oTime+=dt;
    if(F.shakeTime>0)F.shakeTime-=dt;
    if(F.counterFlash>0)F.counterFlash-=dt;
    // Stamina regen
    if(F.pState==='idle'||F.pState==='block'||F.pState==='duck')F.stamina=Math.min(100,F.stamina+dt*35);
    // Counter window countdown
    if(F.counterWindow>0)F.counterWindow-=dt;
    // Return to idle after animation
    if(F.oState==='hit'&&F.oTime>0.15&&!F.aiStunned){F.oState='idle';F.aiTimer=Math.min(F.aiTimer,0.2);}
    if(F.pState==='hit'&&F.pTime>0.3)F.pState='idle';
  }

  const tap=consumeTap();

  switch(state){
    case ST.TITLE:
      if(tap){
        if(tapInArea(tap,W/2-120,500,240,60)){SFX.select();
          state=ST.ORIGIN_CUT;stateTime=0;cutscene.phase=0;
        }
        if(tapInArea(tap,W/2-120,580,240,60)){SFX.select();state=ST.H2H;stateTime=0;}
        if(tapInArea(tap,W/2-120,660,240,60)){SFX.select();state=ST.HOW;stateTime=0;}
      }
      break;

    case ST.HOW:
      if(tap&&tapInArea(tap,W/2-80,H-80,160,50)){SFX.select();state=ST.TITLE;stateTime=0;}
      if(keys['Escape']){state=ST.TITLE;stateTime=0;keys['Escape']=false;}
      break;

    case ST.CAREER:
      if(tap){
        // Check opponent taps
        for(let i=0;i<10;i++){
          if(i<=career.opp&&tapInArea(tap,20,95+i*78,W-40,70)){
            SFX.select();
            initFight(i);
            state=ST.INTRO;stateTime=0;
            break;
          }
        }
        if(tapInArea(tap,W/2-80,H-70,160,50)){SFX.select();state=ST.TITLE;stateTime=0;}
      }
      if(keys['Escape']){state=ST.TITLE;stateTime=0;keys['Escape']=false;}
      break;

    case ST.INTRO:
      if(tap&&stateTime>1&&tapInArea(tap,W/2-110,580,220,65)){
        SFX.bell();state=ST.FIGHT;stateTime=0;startMusic();
      }
      if(keys['Enter']&&stateTime>1){state=ST.FIGHT;stateTime=0;SFX.bell();startMusic();keys['Enter']=false;}
      break;

    case ST.FIGHT:
      F.timer-=dt;
      if(F.timer<=0){endRound();break;}

      processPlayerInput(dt);
      aiUpdate(dt);

      // Pause
      if(getInput().pause){state=ST.PAUSE;prevState=ST.FIGHT;stateTime=0;keys['KeyP']=false;touchBtns.pause=false;}
      break;

    case ST.KD:
      updateKnockdown(dt);
      break;

    case ST.SPECIAL_CUT:
      if(stateTime>=2.0&&!specialCut.dmgApplied){
        // Apply damage at impact moment
        if(specialCut.attacker==='player'){
          F.oH-=specialCut.dmg;F.pDmgDealt+=specialCut.dmg;
          if(F.round<=3)F.pRoundDmg[F.round-1]+=specialCut.dmg;
          F.oState='hit';F.oTime=0;
          F.shakeTime=0.5;F.shakeAmt=15;
          addHitEffect(W/2,280,true);addHitEffect(W/2,280,true);
          if(navigator.vibrate)navigator.vibrate([50,30,100]);
          if(F.oH<=0){F.oH=0;opponentKnockdown();}
        }else{
          const inp=getInput();
          const dodged=F.pState==='dodge_l'||F.pState==='dodge_r'||F.pState==='duck'||F.pState==='block';
          if(!dodged){
            let dmg=specialCut.dmg;
            F.pState='hit';F.pTime=0;F.pHitStun=0.5;F.power=Math.max(0,F.power-15);
            F.pH-=dmg;F.oDmgDealt+=dmg;
            if(F.round<=3)F.oRoundDmg[F.round-1]+=dmg;
            F.shakeTime=0.5;F.shakeAmt=12;
            addHitEffect(W/2,420,true);
            if(F.pH<=0){F.pH=0;playerKnockdown();}
          }else{SFX.miss();}
        }
        specialCut.dmgApplied=true;
      }
      if(stateTime>=2.8&&state===ST.SPECIAL_CUT){
        state=ST.FIGHT;
        F.pState='idle';F.pTime=0;
        if(F.oState!=='kd'){F.oState='idle';}
        F.oTime=0;
        specialCut.active=false;
        inputCooldown=0.3;
      }
      break;

    case ST.ORIGIN_CUT:{
      if((tap&&stateTime>0.5)||keys['Enter']||keys['Space']){
        keys['Enter']=false;keys['Space']=false;
        if(cutscene.phase>=4){state=ST.CAREER;stateTime=0;}
        else{cutscene.phase++;stateTime=0;}
      }
      break;
    }

    case ST.TRAVEL_CUT:
      if((tap&&stateTime>2)||keys['Enter']||keys['Space']){
        state=ST.CAREER;stateTime=0;
        keys['Enter']=false;keys['Space']=false;
      }
      break;

    case ST.ROUND_END:
      if(tap&&stateTime>2&&tapInArea(tap,W/2-80,H/2+50,160,50)){
        startNextRound();
      }
      if(keys['Enter']&&stateTime>2){startNextRound();keys['Enter']=false;}
      break;

    case ST.RESULT:
      if(tap&&stateTime>1.5){
        if(tapInArea(tap,W/2-100,650,200,55)){
          SFX.select();
          if(F.winner==='player'){
            career.wins++;
            if(F.oppIdx>=career.opp)career.opp=Math.min(10,F.oppIdx+1);
            saveGame();
            if(career.opp>=10){state=ST.VICTORY_CUT;stateTime=0;cutscene.phase=0;career.titleDef=true;saveGame();}
            else{
              const fromR=ROOSTERS[F.oppIdx+1];
              const toIdx=Math.min(F.oppIdx+1,9);
              const toR=ROOSTERS[toIdx+1];
              cutscene.from=fromR.country;cutscene.fromFlag=fromR.flag;
              cutscene.to=toR.country;cutscene.toFlag=toR.flag;
              cutscene.destIdx=toIdx;
              state=ST.TRAVEL_CUT;stateTime=0;
            }
          }else{
            career.losses++;saveGame();
            initFight(F.oppIdx);state=ST.INTRO;stateTime=0;
          }
        }
        if(tapInArea(tap,W/2-100,720,200,50)){SFX.select();state=ST.TITLE;stateTime=0;stopMusic();}
      }
      break;

    case ST.VICTORY:
      if(tap&&tapInArea(tap,W/2-100,680,200,55)){SFX.select();state=ST.TITLE;stateTime=0;}
      break;

    case ST.VICTORY_CUT:{
      if((tap&&stateTime>0.5)||keys['Enter']||keys['Space']){
        keys['Enter']=false;keys['Space']=false;
        if(cutscene.phase>=5){state=ST.VICTORY;stateTime=0;}
        else{cutscene.phase++;stateTime=0;}
      }
      break;
    }

    case ST.PAUSE:
      if(tap){
        if(tapInArea(tap,W/2-110,320,220,55)){state=ST.FIGHT;stateTime=0;}
        if(tapInArea(tap,W/2-110,395,220,55)){initFight(F.oppIdx);state=ST.FIGHT;stateTime=0;SFX.bell();}
        if(tapInArea(tap,W/2-110,470,220,55)){state=ST.TITLE;stateTime=0;stopMusic();}
      }
      if(keys['KeyP']||keys['Escape']){state=ST.FIGHT;stateTime=0;keys['KeyP']=false;keys['Escape']=false;}
      break;

    case ST.H2H:
      if(tap){
        // P1 roster selection
        for(let i=0;i<11;i++){
          if(tapInArea(tap,40+i*44,410,40,40)){h2h.p1Pick=i;SFX.select();}
          if(tapInArea(tap,40+i*44,495,40,40)){h2h.p2Pick=i;SFX.select();}
        }
        // Fight
        if(tapInArea(tap,W/2-100,620,200,55)){
          SFX.bell();
          initH2HFight();
          state=ST.FIGHT;stateTime=0;startMusic();
        }
        if(tapInArea(tap,W/2-80,700,160,45)){SFX.select();state=ST.TITLE;stateTime=0;}
      }
      // Keyboard selection
      if(keys['KeyA']){h2h.p1Pick=(h2h.p1Pick+10)%11;SFX.select();keys['KeyA']=false;}
      if(keys['KeyD']){h2h.p1Pick=(h2h.p1Pick+1)%11;SFX.select();keys['KeyD']=false;}
      if(keys['ArrowLeft']){h2h.p2Pick=(h2h.p2Pick+10)%11;SFX.select();keys['ArrowLeft']=false;}
      if(keys['ArrowRight']){h2h.p2Pick=(h2h.p2Pick+1)%11;SFX.select();keys['ArrowRight']=false;}
      if(keys['Escape']){state=ST.TITLE;stateTime=0;keys['Escape']=false;}
      break;
  }
}

function drawSpecialFX(t,oppIdx,isPlayer){
  // Country-specific visual effects during Phase 1 (name flash)
  // oppIdx: -1 for player (Boto/Hawaii), 0-9 for opponents
  const id=isPlayer?-1:oppIdx;

  if(id===-1){
    // POWER BOTO — Hawaiian volcano eruption, lava and hibiscus flowers
    ctx.fillStyle='#1a0500';ctx.fillRect(0,0,W,H);
    // Volcano glow from below
    const glow=ctx.createRadialGradient(W/2,H,0,W/2,H,400);
    glow.addColorStop(0,'rgba(255,80,0,0.6)');glow.addColorStop(0.5,'rgba(255,30,0,0.2)');glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
    // Rising lava particles
    for(let i=0;i<20;i++){
      const lx=W*0.2+Math.sin(i*1.7+t*2)*W*0.3;
      const ly=H-(t*300+i*50)%H;
      const ls=4+Math.sin(i+t*5)*3;
      ctx.fillStyle=['#ff4400','#ff8800','#ffcc00','#ff2200'][i%4];
      ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(lx,ly,ls,0,Math.PI*2);ctx.fill();
    }
    // Hibiscus flowers floating
    ctx.globalAlpha=0.5;
    for(let i=0;i<6;i++){
      const fx=80+i*80+Math.sin(t*2+i)*30;
      const fy=200+Math.sin(t*1.5+i*1.1)*100;
      ctx.fillStyle='#ff4466';
      for(let p=0;p<5;p++){
        const pa=p*Math.PI*2/5+t+i;
        ctx.beginPath();ctx.ellipse(fx+Math.cos(pa)*10,fy+Math.sin(pa)*10,8,5,pa,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(fx,fy,4,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  else if(id===0){
    // EL GALLO — Sombrero Spin: Mexican fiesta, spinning sombreros, papel picado
    ctx.fillStyle='#1a0a00';ctx.fillRect(0,0,W,H);
    // Papel picado banners
    const colors=['#ff2244','#ffdd00','#44cc44','#ff8800','#ff44ff'];
    for(let row=0;row<3;row++){
      const ry=120+row*120;
      ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,ry);ctx.lineTo(W,ry);ctx.stroke();
      for(let i=0;i<8;i++){
        ctx.fillStyle=colors[(i+row)%5];ctx.globalAlpha=0.6;
        const bx=20+i*65+Math.sin(t*3+i+row)*5;
        ctx.fillRect(bx,ry,50,35);
        // Cut-out pattern
        ctx.fillStyle='#1a0a00';
        ctx.beginPath();ctx.arc(bx+25,ry+18,8,0,Math.PI*2);ctx.fill();
        ctx.fillRect(bx+10,ry+28,30,3);
      }
    }
    // Spinning sombrero
    ctx.globalAlpha=0.8;
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(t*6);
    ctx.fillStyle='#cc8833';ctx.beginPath();ctx.ellipse(0,0,60,20,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#aa6622';ctx.beginPath();ctx.ellipse(0,-5,25,25,0,0,Math.PI);ctx.fill();
    ctx.restore();ctx.globalAlpha=1;
  }
  else if(id===1){
    // NOK CHAI — Muay Thai Knee Strike: golden temple energy, Muay Thai ropes
    ctx.fillStyle='#1a0a1a';ctx.fillRect(0,0,W,H);
    const glow=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,300);
    glow.addColorStop(0,'rgba(212,175,55,0.4)');glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
    // Sacred geometry rings
    for(let i=0;i<5;i++){
      ctx.strokeStyle='rgba(212,175,55,'+(0.3-i*0.05)+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(W/2,H/2,60+i*40+Math.sin(t*3+i)*10,0,Math.PI*2);ctx.stroke();
    }
    // Thai script-like energy swirls
    ctx.strokeStyle='#d4af37';ctx.lineWidth=3;ctx.globalAlpha=0.5;
    for(let i=0;i<4;i++){
      ctx.beginPath();
      for(let a=0;a<Math.PI*2;a+=0.1){
        const r=100+Math.sin(a*3+t*4+i)*30;
        ctx.lineTo(W/2+Math.cos(a+t+i)*r,H/2+Math.sin(a+t+i)*r);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  else if(id===2){
    // RAYO — Havana Hurricane: tropical storm, palm trees bending, rain
    ctx.fillStyle='#0a1a2a';ctx.fillRect(0,0,W,H);
    // Spiral wind
    ctx.strokeStyle='rgba(150,200,255,0.3)';ctx.lineWidth=2;
    for(let i=0;i<8;i++){
      ctx.beginPath();
      for(let a=0;a<Math.PI*4;a+=0.15){
        const r=20+a*25+Math.sin(t*5+i)*10;
        ctx.lineTo(W/2+Math.cos(a+t*3+i)*r*0.5,H/2+Math.sin(a+t*3+i)*r*0.4);
      }
      ctx.stroke();
    }
    // Rain streaks
    ctx.strokeStyle='rgba(180,220,255,0.4)';ctx.lineWidth=1;
    for(let i=0;i<30;i++){
      const rx=Math.random()*W,ry=(Math.random()*H+t*500)%H;
      ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-3,ry+15);ctx.stroke();
    }
    // Lightning flash
    if(Math.sin(t*8)>0.95){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(0,0,W,H);}
  }
  else if(id===3){
    // GARUDA — Monsoon Wave: ocean waves crashing, Balinese water temple
    ctx.fillStyle='#0a1a2a';ctx.fillRect(0,0,W,H);
    // Layered waves
    for(let w=0;w<6;w++){
      ctx.fillStyle=`rgba(0,${100+w*20},${180+w*10},${0.3-w*0.04})`;
      ctx.beginPath();ctx.moveTo(0,H);
      for(let x=0;x<=W;x+=10){
        const wy=H/2+w*50+Math.sin(x*0.02+t*4-w*0.8)*40+Math.sin(x*0.05+t*6)*15;
        ctx.lineTo(x,wy);
      }
      ctx.lineTo(W,H);ctx.fill();
    }
    // Water droplets rising
    ctx.fillStyle='rgba(100,220,255,0.6)';
    for(let i=0;i<15;i++){
      const dx=W*0.2+Math.sin(i*2.3)*W*0.3;
      const dy=H-(t*200+i*60)%H;
      ctx.beginPath();ctx.ellipse(dx,dy,3,5,0,0,Math.PI*2);ctx.fill();
    }
  }
  else if(id===4){
    // TROVÃO — Capoeira Storm: Brazilian energy, verde-amarelo, capoeira circle
    ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,W,H);
    // Green and yellow energy bursts
    const glow1=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,250);
    glow1.addColorStop(0,'rgba(0,180,0,0.3)');glow1.addColorStop(0.5,'rgba(255,200,0,0.15)');glow1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow1;ctx.fillRect(0,0,W,H);
    // Capoeira arc trails
    ctx.strokeStyle='#ffcc00';ctx.lineWidth=4;ctx.globalAlpha=0.5;
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc(W/2,H/2+50,80+i*35,Math.PI+t*4+i,Math.PI+t*4+i+2);ctx.stroke();
    }
    ctx.strokeStyle='#00cc00';
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc(W/2,H/2+50,90+i*35,-t*3-i,-t*3-i+1.5);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  else if(id===5){
    // TETSUO — Iron Feather Strike: samurai slash, cherry blossoms, ink wash
    ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
    // Ink wash circles
    ctx.strokeStyle='rgba(150,150,150,0.2)';ctx.lineWidth=8;
    ctx.beginPath();ctx.arc(W/2,H/2,150+Math.sin(t*2)*20,0,Math.PI*1.8);ctx.stroke();
    // Katana slash line
    if(t>0.3){
      const slashProg=Math.min((t-0.3)*4,1);
      ctx.strokeStyle='#ffffff';ctx.lineWidth=4;ctx.globalAlpha=0.8*slashProg;
      ctx.beginPath();ctx.moveTo(W*0.1,H*0.2);
      ctx.lineTo(W*0.1+slashProg*W*0.8,H*0.2+slashProg*H*0.6);ctx.stroke();
      // Slash glow
      ctx.strokeStyle='#aaddff';ctx.lineWidth=12;ctx.globalAlpha=0.2*slashProg;
      ctx.beginPath();ctx.moveTo(W*0.1,H*0.2);
      ctx.lineTo(W*0.1+slashProg*W*0.8,H*0.2+slashProg*H*0.6);ctx.stroke();
    }
    // Cherry blossoms
    ctx.globalAlpha=0.6;
    for(let i=0;i<12;i++){
      ctx.fillStyle=['#ffaacc','#ff88aa','#ffccdd'][i%3];
      const bx=(i*50+t*60)%W;const by=(i*80+t*40+Math.sin(i+t)*30)%H;
      ctx.beginPath();ctx.ellipse(bx,by,4,3,t+i,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  else if(id===6){
    // CICLÓN — Caribbean Crossfire: mirror/prism effect, geometric patterns
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Prismatic refractions
    const prismColors=['#ff0044','#ff8800','#ffff00','#00ff88','#0088ff','#8800ff'];
    for(let i=0;i<6;i++){
      ctx.strokeStyle=prismColors[i];ctx.lineWidth=3;ctx.globalAlpha=0.4;
      const a=t*2+i*Math.PI/3;
      ctx.beginPath();
      ctx.moveTo(W/2,H/2);
      ctx.lineTo(W/2+Math.cos(a)*250,H/2+Math.sin(a)*250);
      ctx.stroke();
      // Reflected lines
      ctx.beginPath();
      ctx.moveTo(W/2,H/2);
      ctx.lineTo(W/2+Math.cos(-a+Math.PI)*250,H/2+Math.sin(-a+Math.PI)*250);
      ctx.stroke();
    }
    // Central prism
    ctx.globalAlpha=0.3;ctx.fillStyle='#ffffff';
    ctx.save();ctx.translate(W/2,H/2);ctx.rotate(t*2);
    ctx.beginPath();ctx.moveTo(0,-30);ctx.lineTo(26,15);ctx.lineTo(-26,15);ctx.closePath();ctx.fill();
    ctx.restore();ctx.globalAlpha=1;
  }
  else if(id===7){
    // AGNI — Tandoori Blast: massive fire explosion, Rajasthani mandala
    ctx.fillStyle='#1a0500';ctx.fillRect(0,0,W,H);
    // Fire explosion rings
    for(let i=0;i<6;i++){
      const r=40+i*40+t*80;
      ctx.strokeStyle=i<2?'#ff2200':i<4?'#ff8800':'#ffcc00';
      ctx.lineWidth=8-i;ctx.globalAlpha=Math.max(0,0.5-r/500);
      ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);ctx.stroke();
    }
    // Fire particles
    ctx.globalAlpha=0.7;
    for(let i=0;i<25;i++){
      const a=i*0.5+t*3;const r=50+t*100+Math.sin(i)*30;
      ctx.fillStyle=['#ff2200','#ff6600','#ffaa00','#ffdd00'][i%4];
      const fs=6+Math.sin(t*6+i)*3;
      ctx.beginPath();ctx.arc(W/2+Math.cos(a)*r,H/2+Math.sin(a)*r,fs,0,Math.PI*2);ctx.fill();
    }
    // Mandala center
    ctx.globalAlpha=0.4;ctx.fillStyle='#ff4400';
    ctx.beginPath();ctx.arc(W/2,H/2,30+Math.sin(t*8)*10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  else if(id===8){
    // COQ D'OR — Fleur-de-Lis Feint: elegant fencing thrust, fleur-de-lis, gold sparkle
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Elegant gold sparkle field
    for(let i=0;i<30;i++){
      ctx.fillStyle='rgba(255,215,0,'+(0.2+Math.sin(t*4+i*0.7)*0.3)+')';
      ctx.beginPath();ctx.arc(Math.sin(i*3.7)*250+270,Math.cos(i*2.3)*400+480,2,0,Math.PI*2);ctx.fill();
    }
    // Fencing thrust line
    if(t>0.2){
      const prog=Math.min((t-0.2)*3,1);
      ctx.strokeStyle='#ffd700';ctx.lineWidth=3;ctx.globalAlpha=0.8;
      ctx.beginPath();ctx.moveTo(W*0.8,H*0.3);
      ctx.lineTo(W*0.8-prog*W*0.5,H*0.3+prog*H*0.3);ctx.stroke();
      // Rapier tip sparkle
      const tx=W*0.8-prog*W*0.5,ty=H*0.3+prog*H*0.3;
      ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(tx,ty,5+Math.sin(t*10)*3,0,Math.PI*2);ctx.fill();
    }
    // Fleur-de-lis (simplified)
    ctx.globalAlpha=0.3;ctx.fillStyle='#ffd700';
    ctx.save();ctx.translate(W/2,H/2-40);ctx.scale(1.5,1.5);
    ctx.beginPath();ctx.moveTo(0,-20);ctx.quadraticCurveTo(10,-10,8,5);ctx.quadraticCurveTo(5,15,0,20);
    ctx.quadraticCurveTo(-5,15,-8,5);ctx.quadraticCurveTo(-10,-10,0,-20);ctx.fill();
    ctx.restore();ctx.globalAlpha=1;
  }
  else if(id===9){
    // MABUHAY — Typhoon Fury: lightning storm, typhoon spiral, purple-black sky
    ctx.fillStyle='#0a0010';ctx.fillRect(0,0,W,H);
    // Typhoon spiral
    ctx.strokeStyle='rgba(100,50,200,0.4)';ctx.lineWidth=3;
    for(let arm=0;arm<4;arm++){
      ctx.beginPath();
      for(let a=0;a<Math.PI*6;a+=0.1){
        const r=10+a*15;
        ctx.lineTo(W/2+Math.cos(a+t*4+arm*Math.PI/2)*r,H/2+Math.sin(a+t*4+arm*Math.PI/2)*r);
      }
      ctx.stroke();
    }
    // Lightning bolts
    for(let b=0;b<3;b++){
      if(Math.sin(t*6+b*2)>0.3){
        ctx.strokeStyle='#ffdd00';ctx.lineWidth=3;ctx.globalAlpha=0.8;
        ctx.beginPath();
        let lx=100+b*170,ly=0;
        ctx.moveTo(lx,ly);
        for(let s=0;s<6;s++){lx+=Math.random()*40-20;ly+=H/6;ctx.lineTo(lx,ly);}
        ctx.stroke();
        // Glow
        ctx.strokeStyle='#ffffff';ctx.lineWidth=6;ctx.globalAlpha=0.15;
        ctx.stroke();
      }
    }
    ctx.globalAlpha=1;
    // Purple energy center
    ctx.fillStyle='rgba(150,50,255,0.3)';
    ctx.beginPath();ctx.arc(W/2,H/2,60+Math.sin(t*6)*20,0,Math.PI*2);ctx.fill();
  }
}

function drawSpecialCutscene(){
  const t=stateTime;
  const isPlayer=specialCut.attacker==='player';
  const col=isPlayer?F.plr.col:F.opp.col;
  const name=specialCut.name;

  // Phase 0: Dramatic zoom (0-0.8s)
  // Phase 1: Country-specific FX + name flash (0.8-1.8s)
  // Phase 2: Impact (1.8-2.3s)
  // Phase 3: Return to fight (2.3-2.8s)

  if(t<0.8){
    // Zoom into attacker with dramatic darken
    drawFight();
    const zoom=1+t*0.6;
    ctx.fillStyle=`rgba(0,0,0,${t*0.8})`;ctx.fillRect(0,0,W,H);
    const ry=isPlayer?460:280;
    const sc=isPlayer?1.8:2.0;
    ctx.save();
    ctx.translate(W/2,H/2);ctx.scale(zoom,zoom);ctx.translate(-W/2,-H/2);
    if(isPlayer)drawRoosterFront(W/2,ry,sc*(F.plr.scale||1),col,'special',t,'none',-1);
    else drawRoosterFront(W/2,ry,sc*(F.opp.scale||1),col,'special',t,F.opp.trait,F.oppIdx);
    ctx.restore();
    // Radial energy gathering
    ctx.globalAlpha=t;
    for(let i=0;i<16;i++){
      const a=Math.PI*2*i/16+t*5;
      const r=200-t*150;
      ctx.fillStyle=isPlayer?'#ffdd00':'#ff4444';
      ctx.beginPath();ctx.arc(W/2+Math.cos(a)*r,H/2+Math.sin(a)*r,3+t*4,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }else if(t<1.8){
    // Country-specific animated background + attack name
    const lt=t-0.8;
    drawSpecialFX(lt,F.oppIdx,isPlayer);

    // Attacker rooster centered
    ctx.globalAlpha=0.6;
    if(isPlayer)drawRoosterFront(W/2,H/2+40,2.0,col,'special',t,'none',-1);
    else drawRoosterFront(W/2,H/2+40,2.0*(F.opp.scale||1),col,'special',t,F.opp.trait,F.oppIdx);
    ctx.globalAlpha=1;

    // Per-fighter special pose overlays
    ctx.globalAlpha=0.8;
    const sid=isPlayer?-1:F.oppIdx;
    if(sid===1){// Nok Chai - draw raised knee
      ctx.fillStyle='#dd9933';ctx.strokeStyle='#bb7722';ctx.lineWidth=3;
      const ky=H/2+80,kx=W/2+15;
      ctx.beginPath();ctx.moveTo(kx,ky);ctx.lineTo(kx+10,ky-40);ctx.lineTo(kx+5,ky-42);ctx.lineTo(kx-5,ky);ctx.closePath();ctx.fill();ctx.stroke();
    }
    if(sid===4){// Trovão - draw legs kicking up
      ctx.strokeStyle='#dd9933';ctx.lineWidth=4;ctx.lineCap='round';
      const baseY=H/2+40;
      ctx.beginPath();ctx.moveTo(W/2-15,baseY+30);ctx.lineTo(W/2-40,baseY-20);ctx.stroke();
      ctx.beginPath();ctx.moveTo(W/2+15,baseY+30);ctx.lineTo(W/2+45,baseY-30);ctx.stroke();
    }
    ctx.globalAlpha=1;

    // Attack name with dramatic entrance
    const nameAlpha=Math.min(lt*3,1);
    const nameScale=1+Math.max(0,1-lt*4)*0.5; // starts big, settles
    ctx.save();ctx.translate(W/2,160);ctx.scale(nameScale,nameScale);
    ctx.globalAlpha=nameAlpha;
    drawText(name.toUpperCase(),0,0,'bold 30px monospace',isPlayer?'#ffdd00':'#ff4444','center',true);
    ctx.restore();ctx.globalAlpha=1;

    // Pulsing border in attacker's color
    ctx.strokeStyle=isPlayer?'rgba(255,221,0,0.4)':'rgba(255,68,68,0.4)';
    ctx.lineWidth=4+Math.sin(lt*12)*2;
    ctx.strokeRect(4,4,W-8,H-8);
  }else if(t<2.3){
    // Impact
    const it=t-1.8;
    drawFight();
    // White flash
    ctx.fillStyle=`rgba(255,255,255,${Math.max(0,0.9-it*4)})`;ctx.fillRect(0,0,W,H);
    // Impact text
    ctx.globalAlpha=Math.max(0,1-it*3);
    const impactScale=1+it*2;
    ctx.save();ctx.translate(W/2,H/2);ctx.scale(impactScale,impactScale);
    drawText('IMPACT!',0,0,'bold 44px monospace',isPlayer?'#ffdd00':'#ff4444','center',true);
    ctx.restore();ctx.globalAlpha=1;
  }else{
    drawFight();
  }
}

function drawOriginCutscene(){
  const t=stateTime;
  const phase=cutscene.phase;
  const fadeIn=Math.min(t*3,1);

  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);

  if(phase===0){
    const skyG=ctx.createLinearGradient(0,0,0,H*0.6);
    skyG.addColorStop(0,'#ff6633');skyG.addColorStop(0.4,'#ffaa55');skyG.addColorStop(0.8,'#4488cc');
    ctx.globalAlpha=fadeIn;
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H*0.6);

    const sunY=300-Math.min(t,3)*30;
    ctx.fillStyle='#ffdd44';ctx.beginPath();ctx.arc(W/2,sunY,40,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,220,80,0.3)';ctx.beginPath();ctx.arc(W/2,sunY,60+Math.sin(t*3)*5,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#2266aa';ctx.fillRect(0,360,W,100);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(-20,370+i*15);
      ctx.quadraticCurveTo(130+Math.sin(t*2+i)*30,365+i*15,270,375+i*15);
      ctx.quadraticCurveTo(400+Math.sin(t*2+i+1)*30,365+i*15,560,370+i*15);
      ctx.stroke();
    }

    ctx.fillStyle='#c4a050';ctx.fillRect(0,450,W,H-450);

    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(80,200,8,260);
    for(let i=0;i<5;i++){
      ctx.save();ctx.translate(84,205);ctx.rotate(-0.8+i*0.4);
      ctx.fillRect(-3,-50,6,50);ctx.restore();
    }

    const botoX=W/2+Math.sin(t)*5;
    ctx.globalAlpha=fadeIn*0.8;
    drawRoosterFront(botoX,420,1.2,ROOSTERS[0].col,'idle',t);

    ctx.globalAlpha=fadeIn;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,H-200,W,200);
    drawText('WAIANAE, HAWAII',W/2,H-170,'bold 22px monospace','#ffcc44','center',true);
    drawText('Where it all began...',W/2,H-140,'italic 16px monospace','#ccaa77','center');

    ctx.font='13px monospace';ctx.fillStyle='#dddddd';ctx.textAlign='center';
    const lines1=['Born in the red dirt of Waianae,','Boto trained every sunrise with','his grandfather, Tūtū Kane.'];
    lines1.forEach((line,i)=>ctx.fillText(line,W/2,H-110+i*20));
  }

  else if(phase===1){
    ctx.globalAlpha=fadeIn;
    const skyG=ctx.createLinearGradient(0,0,0,400);
    skyG.addColorStop(0,'#cc4422');skyG.addColorStop(0.5,'#ff8844');skyG.addColorStop(1,'#ffcc66');
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,400);
    ctx.fillStyle='#c4a050';ctx.fillRect(0,400,W,200);

    const sparX=W/2-60+Math.sin(t*6)*15;
    drawRoosterFront(sparX,370,1.3,ROOSTERS[0].col,'jabL',t);
    const grandCol={body:'#881111',acc:'#aa5500',feath:'#660000',trim:'#cc8800',comb:'#aa2222',wattle:'#aa3333',beak:'#cc8800',glove:'#661100'};
    drawRoosterFront(W/2+80,360,1.6,grandCol,'idle',t);

    if(Math.floor(t*4)%2===0){
      ctx.fillStyle='#ffdd00';
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.arc(W/2+10+Math.random()*20,370+Math.random()*20,3,0,Math.PI*2);ctx.fill();
      }
    }

    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,H-180,W,180);
    drawText('TRAINING',W/2,H-150,'bold 22px monospace','#ffcc44','center',true);
    ctx.font='13px monospace';ctx.fillStyle='#dddddd';ctx.textAlign='center';
    const lines2=["Tūtū Kane was a legend —","the greatest fighter Hawaii ever saw.","He taught Boto everything he knew."];
    lines2.forEach((line,i)=>ctx.fillText(line,W/2,H-120+i*20));
  }

  else if(phase===2){
    ctx.globalAlpha=fadeIn;
    ctx.fillStyle='#1a1a2a';ctx.fillRect(0,0,W,H);

    for(let i=0;i<40;i++){
      ctx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(t+i*0.7)*0.2)+')';
      ctx.beginPath();ctx.arc(Math.sin(i*7)*250+270,Math.cos(i*5)*150+150,1.5,0,Math.PI*2);ctx.fill();
    }

    ctx.fillStyle='rgba(200,220,255,0.15)';ctx.beginPath();ctx.arc(400,80,35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(220,240,255,0.8)';ctx.beginPath();ctx.arc(400,80,25,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#5a3a1a';
    drawRRect(W/2-30,430,60,35,5,'#5a3a1a');
    ctx.fillStyle='#8b6914';ctx.fillRect(W/2-25,427,50,4);
    ctx.fillStyle='#cc8800';ctx.fillRect(W/2-2,425,4,8);

    drawRoosterFront(W/2,390,1.4,ROOSTERS[0].col,'duck',t*0.3);

    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,H-180,W,180);
    drawText('THE LEGACY',W/2,H-150,'bold 22px monospace','#8888cc','center',true);
    ctx.font='13px monospace';ctx.fillStyle='#cccccc';ctx.textAlign='center';
    const lines3=["When Tūtū Kane passed, he left","Boto a worn leather suitcase","and a list of ten names —","the greatest fighters in the world."];
    lines3.forEach((line,i)=>ctx.fillText(line,W/2,H-120+i*20));
  }

  else if(phase===3){
    ctx.globalAlpha=fadeIn;
    // Sky
    const skyG3=ctx.createLinearGradient(0,0,0,300);
    skyG3.addColorStop(0,'#1a3366');skyG3.addColorStop(1,'#5588cc');
    ctx.fillStyle=skyG3;ctx.fillRect(0,0,W,350);
    // Clouds
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<6;i++){
      const cx=((i*120+t*40)%650)-50;
      ctx.beginPath();ctx.ellipse(cx,60+i*35,45+i*8,14+i*3,0,0,Math.PI*2);ctx.fill();
    }
    // Ocean
    ctx.fillStyle='#1a4488';ctx.fillRect(0,350,W,200);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
    for(let i=0;i<4;i++){
      ctx.beginPath();
      for(let x=0;x<W;x+=30){ctx.lineTo(x,360+i*18+Math.sin(t*2+x*0.03+i)*4);}
      ctx.stroke();
    }
    // Plane flying RIGHT — nose on left drawn, then flipped
    const pt3=Math.min(t,4);
    const planeX=80+pt3*90;
    const planeY=220+Math.sin(t*1.5)*10;
    ctx.save();ctx.translate(planeX,planeY);ctx.scale(-1,1);ctx.rotate(0.08);
    // Exhaust trail
    ctx.globalAlpha=0.15;ctx.fillStyle='#fff';
    for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(-55-i*18,5+Math.sin(t*6+i)*2,7+i*4,3+i*1.5,0,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
    // Fuselage
    ctx.fillStyle='#eee';ctx.beginPath();ctx.ellipse(0,0,50,14,0,0,Math.PI*2);ctx.fill();
    // Wings
    ctx.fillStyle='#cc3333';ctx.fillRect(-45,-2,90,4);
    // Tail
    ctx.fillStyle='#ddd';ctx.fillRect(42,-22,10,26);
    // Windows
    ctx.fillStyle='#55aaff';
    for(let w=0;w<5;w++){ctx.beginPath();ctx.arc(-25+w*12,-2,2.5,0,Math.PI*2);ctx.fill();}
    ctx.restore();
    // Shadow on ocean
    ctx.globalAlpha=0.15;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(planeX+15,420,35,6,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // Boto at airport
    drawRoosterFront(W/2,500,1.2,ROOSTERS[0].col,'idle',t);
    ctx.fillStyle='#5a3a1a';drawRRect(W/2+35,520,22,16,3,'#5a3a1a');

    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,H-150,W,150);
    drawText('THE JOURNEY BEGINS',W/2,H-120,'bold 20px monospace','#ffcc44','center',true);
    ctx.font='13px monospace';ctx.fillStyle='#dddddd';ctx.textAlign='center';
    const lines4=["With nothing but Tūtū Kane's suitcase,","Boto boards his first flight —","destination: Mexico City."];
    lines4.forEach((line,i)=>ctx.fillText(line,W/2,H-90+i*20));
  }

  else if(phase===4){
    ctx.globalAlpha=fadeIn;
    // Dark ocean background
    ctx.fillStyle='#0c1a2e';ctx.fillRect(0,0,W,H);

    // Subtle ocean shimmer
    ctx.fillStyle='rgba(30,60,100,0.3)';
    for(let i=0;i<8;i++){
      ctx.beginPath();ctx.ellipse(W/2+Math.sin(i*1.3)*200,300+i*40,180,20+Math.sin(t+i)*5,0,0,Math.PI*2);ctx.fill();
    }

    // Hawaii marker (left side)
    const hx=100,hy=380;
    ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(hx,hy,10+Math.sin(t*4)*3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,68,68,0.3)';ctx.beginPath();ctx.arc(hx,hy,20+Math.sin(t*3)*5,0,Math.PI*2);ctx.fill();
    drawText('🌺',hx,hy-25,'20px monospace','#fff','center');
    drawText('HAWAII',hx,hy+30,'bold 14px monospace','#ff8866','center');

    // Mexico marker (right side)
    const mx=430,my=380;

    // Animated dashed line from Hawaii to Mexico
    const lineProgress=Math.min(t/2,1);
    ctx.strokeStyle='#ffcc00';ctx.lineWidth=3;ctx.setLineDash([8,6]);
    ctx.beginPath();ctx.moveTo(hx,hy);
    // Curved arc
    const cpx=W/2,cpy=280;
    const lp=lineProgress;
    const curX=hx*(1-lp)*(1-lp)+2*cpx*lp*(1-lp)+mx*lp*lp;
    const curY=hy*(1-lp)*(1-lp)+2*cpy*lp*(1-lp)+my*lp*lp;
    ctx.quadraticCurveTo(hx+(cpx-hx)*lp,hy+(cpy-hy)*lp,curX,curY);
    ctx.stroke();ctx.setLineDash([]);

    // Plane icon along the path
    if(lineProgress<1){
      ctx.fillStyle='#fff';ctx.font='20px monospace';ctx.textAlign='center';
      ctx.fillText('✈',curX,curY-10);
    }

    if(lineProgress>=1){
      ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(mx,my,8+Math.sin(t*3)*3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,204,0,0.3)';ctx.beginPath();ctx.arc(mx,my,18+Math.sin(t*2.5)*5,0,Math.PI*2);ctx.fill();
      drawText('🇲🇽',mx,my-25,'20px monospace','#fff','center');
      drawText('MEXICO',mx,my+30,'bold 14px monospace','#ffcc44','center');
    }

    // Title
    drawText("BOTO'S WORLD TOUR",W/2,100,'bold 28px monospace','#ffcc44','center',true);
    drawText('10 countries. 10 fighters.',W/2,140,'16px monospace','#aaa','center');
    drawText('1 champion.',W/2,170,'bold 18px monospace','#ff6644','center');

    // Bottom bar
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,H-90,W,90);
    drawText('First stop: MEXICO',W/2,H-55,'bold 22px monospace','#ffcc44','center',true);
  }

  else{
    state=ST.CAREER;stateTime=0;
    return;
  }

  ctx.globalAlpha=1;

  if(t>0.5){
    ctx.globalAlpha=0.5+Math.sin(t*2)*0.3;
    drawText(phase>=4?'TAP TO START':'TAP TO CONTINUE',W/2,H-15,'bold 14px monospace','#ffcc44','center');
    ctx.globalAlpha=1;
  }
}

function drawTravelCutscene(){
  const t=stateTime;
  const duration=5;
  const progress=Math.min(t/duration,1);

  const skyG=ctx.createLinearGradient(0,0,0,300);
  skyG.addColorStop(0,'#1a2a4a');skyG.addColorStop(0.5,'#3366aa');skyG.addColorStop(1,'#5588cc');
  ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<8;i++){
    const cx=((i*180-t*60)%700)-80;
    const cy=100+i*30+Math.sin(i*2)*20;
    ctx.beginPath();ctx.ellipse(cx,cy,40+i*5,12+i*2,0,0,Math.PI*2);ctx.fill();
  }

  ctx.fillStyle='rgba(255,255,255,0.2)';
  for(let i=0;i<5;i++){
    const cx=((i*220-t*20)%700)-80;
    ctx.beginPath();ctx.ellipse(cx,60+i*25,60,15,0,0,Math.PI*2);ctx.fill();
  }

  ctx.fillStyle='#1a4488';ctx.fillRect(0,500,W,H-500);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.moveTo(-20,510+i*20);
    for(let x=0;x<W+40;x+=40){
      ctx.quadraticCurveTo(x+20,505+i*20+Math.sin(t*2+x*0.02+i)*5,x+40,510+i*20);
    }
    ctx.stroke();
  }

  const planeX=W*0.5+Math.sin(t*0.5)*20;
  const planeY=280+Math.sin(t*1.5)*15;
  ctx.save();ctx.translate(planeX,planeY);ctx.scale(-1,1);

  ctx.globalAlpha=0.2;
  ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(20,230,40,8,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  ctx.fillStyle='#eee';
  ctx.beginPath();ctx.ellipse(0,0,55,16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ccc';ctx.fillRect(-20,-6,40,50);
  ctx.fillStyle='#ddd';ctx.fillRect(45,-25,12,30);
  ctx.fillStyle='#cc3333';ctx.fillRect(-50,-2,100,4);
  ctx.fillStyle='#55aaff';
  for(let w=0;w<6;w++){ctx.beginPath();ctx.arc(-30+w*12,-3,3,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=0.15;
  ctx.fillStyle='#fff';
  for(let i=0;i<8;i++){
    ctx.beginPath();ctx.ellipse(-60-i*20,10+Math.sin(t*8+i)*3,8+i*3,4+i,0,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();

  ctx.fillStyle='#cc3333';
  ctx.beginPath();ctx.arc(planeX+6,planeY-3,2.5,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,H-220,W,220);

  const fromAlpha=progress<0.3?1:Math.max(0,1-(progress-0.3)*3);
  const toAlpha=progress>0.4?Math.min(1,(progress-0.4)*3):0;

  ctx.globalAlpha=0.5+fromAlpha*0.5;
  drawText(cutscene.fromFlag+' '+cutscene.from,W/2,H-185,'bold 16px monospace','#aaaaaa','center');
  ctx.globalAlpha=1;

  drawText('✈',W/2,H-155,'24px monospace','#ffcc44','center');

  ctx.globalAlpha=toAlpha;
  drawText(cutscene.toFlag+' '+cutscene.to,W/2,H-120,'bold 24px monospace','#ffcc44','center',true);
  drawText('NEXT CHALLENGER',W/2,H-90,'14px monospace','#aaa','center');
  ctx.globalAlpha=1;

  for(let i=0;i<10;i++){
    const dx=W/2-90+i*20;
    ctx.fillStyle=i<(cutscene.destIdx||0)?'#ffcc44':i===(cutscene.destIdx||0)?'#ff4444':'#444';
    ctx.beginPath();ctx.arc(dx,H-50,5,0,Math.PI*2);ctx.fill();
  }

  if(t>2){
    ctx.globalAlpha=0.5+Math.sin(t*2)*0.3;
    drawText('TAP TO CONTINUE',W/2,H-15,'bold 14px monospace','#ffcc44','center');
    ctx.globalAlpha=1;
  }
}

function drawVictoryCutscene(){
  const t=stateTime;
  const phase=cutscene.phase;
  const fadeIn=Math.min(t*3,1);

  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);

  if(phase===0){
    // KNOCKOUT — Mabuhay falls in the Philippines pen
    ctx.globalAlpha=fadeIn;
    // Night sky
    const skyG=ctx.createLinearGradient(0,0,0,H*0.5);
    skyG.addColorStop(0,'#0a0a2a');skyG.addColorStop(1,'#1a1a4a');
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H*0.5);
    // Stars
    for(let i=0;i<30;i++){
      ctx.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(t*2+i)*0.3)+')';
      ctx.beginPath();ctx.arc(Math.sin(i*7.3)*250+270,Math.cos(i*5.1)*120+80,1.5,0,Math.PI*2);ctx.fill();
    }
    // Dirt ground
    ctx.fillStyle='#3a2a1a';ctx.fillRect(0,H*0.5,W,H*0.5);
    // Torches flickering
    for(let i=0;i<2;i++){
      const tx=i===0?80:460;
      ctx.fillStyle='#5a3a1a';ctx.fillRect(tx-3,250,6,200);
      ctx.fillStyle='rgba(255,150,30,'+(0.6+Math.sin(t*8+i*3)*0.3)+')';
      ctx.beginPath();ctx.ellipse(tx,248,10+Math.sin(t*6+i)*3,14+Math.sin(t*7+i)*4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,200,50,'+(0.3+Math.sin(t*10+i)*0.2)+')';
      ctx.beginPath();ctx.ellipse(tx,244,6,8,0,0,Math.PI*2);ctx.fill();
    }
    // Mabuhay falling
    const fallAngle=Math.min(t*1.5,1.2);
    ctx.save();ctx.translate(W/2+40,420);ctx.rotate(fallAngle);
    drawRoosterFront(0,0,1.5,ROOSTERS[10].col,'kd',t,ROOSTERS[10].trait);
    ctx.restore();
    // Boto standing victorious
    const botoY=400+Math.sin(t*3)*3;
    drawRoosterFront(W/2-60,botoY,1.4,ROOSTERS[0].col,'idle',t);
    // Impact stars
    if(t<2){
      for(let i=0;i<5;i++){
        const sx=W/2+30+Math.cos(t*4+i*1.3)*40;
        const sy=380+Math.sin(t*4+i*1.7)*30;
        ctx.fillStyle='#ffdd00';ctx.font='16px monospace';ctx.textAlign='center';
        ctx.fillText('★',sx,sy);
      }
    }
    ctx.globalAlpha=fadeIn;
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,H-140,W,140);
    drawText('K.O.!',W/2,H-105,'bold 36px monospace','#ff4444','center',true);
    drawText('Mabuhay has fallen!',W/2,H-65,'18px monospace','#ffcc44','center');
  }

  else if(phase===1){
    // CROWD ROAR — Boto celebrates in the pen
    ctx.globalAlpha=fadeIn;
    // Golden sky
    const skyG=ctx.createLinearGradient(0,0,0,H*0.5);
    skyG.addColorStop(0,'#ff8800');skyG.addColorStop(0.5,'#ffcc44');skyG.addColorStop(1,'#ffeeaa');
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H);
    // Confetti
    for(let i=0;i<40;i++){
      const colors=['#ff4444','#ffdd00','#44ff44','#4488ff','#ff44ff','#ffffff'];
      ctx.fillStyle=colors[i%6];
      const cx=(Math.sin(i*3.7)*300+270+t*20*((i%3)-1))%580;
      const cy=(i*24+t*80*(0.5+i%3*0.3))%H;
      ctx.save();ctx.translate(cx,cy);ctx.rotate(t*3+i);
      ctx.fillRect(-4,-2,8,4);ctx.restore();
    }
    // Boto big and proud center stage
    const bounce=Math.abs(Math.sin(t*4))*15;
    drawRoosterFront(W/2,350-bounce,2.2,ROOSTERS[0].col,'idle',t);
    // Golden glow behind
    ctx.globalAlpha=0.2+Math.sin(t*2)*0.1;
    ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.arc(W/2,350,120+Math.sin(t*3)*20,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,H-140,W,140);
    drawText('THE CROWD GOES WILD!',W/2,H-105,'bold 22px monospace','#ffdd00','center',true);
    drawText('Boto is unstoppable!',W/2,H-65,'16px monospace','#ffffff','center');
  }

  else if(phase===2){
    // BELT CEREMONY — Boto receives the championship
    ctx.globalAlpha=fadeIn;
    ctx.fillStyle='#1a0a2a';ctx.fillRect(0,0,W,H);
    // Spotlight
    ctx.fillStyle='rgba(255,220,100,0.08)';
    ctx.beginPath();ctx.moveTo(W/2-120,0);ctx.lineTo(W/2+120,0);
    ctx.lineTo(W/2+200,H);ctx.lineTo(W/2-200,H);ctx.closePath();ctx.fill();
    // Belt floating down
    const beltY=Math.min(t*80,280);
    ctx.save();ctx.translate(W/2,beltY);
    // Belt shape
    ctx.fillStyle='#d4af37';drawRRect(-50,-12,100,24,6,'#d4af37');
    ctx.fillStyle='#ffd700';drawRRect(-30,-8,60,16,4,'#ffd700');
    ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('CHAMPION',0,4);
    // Gems
    ctx.fillStyle='#ff0000';ctx.beginPath();ctx.arc(-20,0,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0066ff';ctx.beginPath();ctx.arc(20,0,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#00cc00';ctx.beginPath();ctx.arc(0,-5,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Boto beneath belt
    drawRoosterFront(W/2,420,1.8,ROOSTERS[0].col,'idle',t);
    // Sparkles around belt
    if(beltY>=280){
      for(let i=0;i<8;i++){
        const sparkA=t*2+i*0.8;
        const sx=W/2+Math.cos(sparkA)*70;
        const sy=280+Math.sin(sparkA)*30;
        ctx.fillStyle='rgba(255,215,0,'+(0.4+Math.sin(t*4+i)*0.4)+')';
        ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,H-140,W,140);
    drawText('WORLD CHAMPION',W/2,H-105,'bold 26px monospace','#ffd700','center',true);
    drawText('The belt belongs to Boto!',W/2,H-65,'16px monospace','#ffffff','center');
  }

  else if(phase===3){
    // FLIGHT HOME — Boto flies back to Hawaii
    ctx.globalAlpha=fadeIn;
    // Sunset sky
    const skyG=ctx.createLinearGradient(0,0,0,350);
    skyG.addColorStop(0,'#ff6633');skyG.addColorStop(0.4,'#ffaa55');skyG.addColorStop(0.8,'#5588cc');
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,400);
    // Ocean
    ctx.fillStyle='#1a4488';ctx.fillRect(0,400,W,H-400);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
    for(let i=0;i<5;i++){
      ctx.beginPath();
      for(let x=0;x<W;x+=30){ctx.lineTo(x,410+i*18+Math.sin(t*2+x*0.03+i)*4);}
      ctx.stroke();
    }
    // Clouds scrolling right to left (heading home)
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(let i=0;i<6;i++){
      const cx=((i*130-t*35)%650+650)%650-50;
      ctx.beginPath();ctx.ellipse(cx,80+i*30,50+i*8,14+i*3,0,0,Math.PI*2);ctx.fill();
    }
    // Plane flying LEFT (going home)
    const planeX=W*0.5+Math.sin(t*0.5)*20;
    const planeY=250+Math.sin(t*1.5)*10;
    ctx.save();ctx.translate(planeX,planeY);ctx.rotate(0.05);
    // Exhaust trail (behind = to the right)
    ctx.globalAlpha=0.15;ctx.fillStyle='#fff';
    for(let i=0;i<6;i++){ctx.beginPath();ctx.ellipse(55+i*18,5+Math.sin(t*6+i)*2,7+i*4,3+i*1.5,0,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
    // Fuselage
    ctx.fillStyle='#eee';ctx.beginPath();ctx.ellipse(0,0,50,14,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc3333';ctx.fillRect(-45,-2,90,4);
    ctx.fillStyle='#ddd';ctx.fillRect(-48,-22,10,26);
    ctx.fillStyle='#55aaff';
    for(let w=0;w<5;w++){ctx.beginPath();ctx.arc(-15+w*12,-2,2.5,0,Math.PI*2);ctx.fill();}
    ctx.restore();
    // Shadow
    ctx.globalAlpha=0.15;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(planeX-15,470,35,6,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,H-140,W,140);
    drawText('HEADING HOME',W/2,H-105,'bold 24px monospace','#ffcc44','center',true);
    drawText('Back to Hawaii... a champion.',W/2,H-65,'15px monospace','#dddddd','center');
  }

  else if(phase===4){
    // HOME — Boto returns to Waianae beach at sunset
    ctx.globalAlpha=fadeIn;
    // Sunset
    const skyG=ctx.createLinearGradient(0,0,0,H*0.55);
    skyG.addColorStop(0,'#ff4422');skyG.addColorStop(0.4,'#ff8844');skyG.addColorStop(0.8,'#ffcc66');
    ctx.fillStyle=skyG;ctx.fillRect(0,0,W,H*0.55);
    // Setting sun
    const sunY=250;
    ctx.fillStyle='#ffdd44';ctx.beginPath();ctx.arc(W/2,sunY,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,220,80,0.25)';ctx.beginPath();ctx.arc(W/2,sunY,80+Math.sin(t*2)*5,0,Math.PI*2);ctx.fill();
    // Ocean
    ctx.fillStyle='#cc5500';ctx.fillRect(0,330,W,60);
    ctx.fillStyle='#2266aa';ctx.fillRect(0,390,W,80);
    // Beach
    ctx.fillStyle='#c4a050';ctx.fillRect(0,470,W,H-470);
    // Palm tree
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(90,220,8,260);
    for(let i=0;i<5;i++){
      ctx.save();ctx.translate(94,225);ctx.rotate(-0.8+i*0.4);
      ctx.fillRect(-3,-55,6,55);ctx.restore();
    }
    // Boto on the beach with belt
    drawRoosterFront(W/2,440,1.6,ROOSTERS[0].col,'idle',t);
    // Belt on Boto
    ctx.fillStyle='#d4af37';drawRRect(W/2-20,435,40,10,3,'#d4af37');
    ctx.fillStyle='#ffd700';drawRRect(W/2-12,437,24,6,2,'#ffd700');
    // Suitcase next to Boto
    ctx.fillStyle='#5a3a1a';drawRRect(W/2+50,470,30,20,4,'#5a3a1a');
    ctx.fillStyle='#8b6914';ctx.fillRect(W/2+53,467,24,4);

    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,H-160,W,160);
    drawText('WAIANAE, HAWAII',W/2,H-135,'bold 22px monospace','#ffcc44','center',true);
    ctx.font='13px monospace';ctx.fillStyle='#dddddd';ctx.textAlign='center';
    const lines=["Boto returns home — champion of the world.","Tūtū Kane's legacy lives on.","The worn leather suitcase rests at last."];
    lines.forEach((line,i)=>ctx.fillText(line,W/2,H-100+i*22));
  }

  else if(phase===5){
    // CREDITS / FINAL — title card with stats
    ctx.globalAlpha=fadeIn;
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Starfield
    for(let i=0;i<60;i++){
      ctx.fillStyle='rgba(255,255,255,'+(0.2+Math.sin(t+i*0.5)*0.3)+')';
      ctx.beginPath();ctx.arc(Math.sin(i*4.7)*260+270,Math.cos(i*3.1)*350+450,1.2,0,Math.PI*2);ctx.fill();
    }
    // Golden glow
    ctx.fillStyle='rgba(255,200,50,0.06)';
    ctx.beginPath();ctx.arc(W/2,300,200+Math.sin(t)*20,0,Math.PI*2);ctx.fill();
    // Boto silhouette with crown effect
    drawRoosterFront(W/2,340,2.0,ROOSTERS[0].col,'idle',t);
    // Crown sparkle
    for(let i=0;i<5;i++){
      const cx=W/2-20+i*10;
      const cy=240+Math.sin(t*3+i*1.2)*5;
      ctx.fillStyle='rgba(255,215,0,'+(0.5+Math.sin(t*4+i)*0.4)+')';
      ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();
    }

    drawText("BOTO THE FIGHTING",W/2,60,'bold 24px monospace','#ffdd00','center',true);
    drawText("CHICKEN'S",W/2,90,'bold 28px monospace','#ffdd00','center',true);
    drawText('INTERNATIONAL',W/2,125,'bold 22px monospace','#ff4444','center',true);
    drawText('FIGHT CLUB',W/2,158,'bold 30px monospace','#ff4444','center',true);

    drawText('WORLD CHAMPION',W/2,210,'bold 20px monospace','#ffd700','center',true);

    // Record
    drawText(`Record: ${career.wins}W - ${career.losses}L`,W/2,500,'16px monospace','#aaa','center');
    drawText('TITLE DEFENSE UNLOCKED!',W/2,535,'bold 16px monospace','#ff8844','center',true);
    drawText('All opponents are faster & stronger!',W/2,560,'13px monospace','#999','center');

    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,H-70,W,70);
    drawText('MAHALO',W/2,H-35,'bold 20px monospace','#ffcc44','center',true);
  }

  else{
    state=ST.VICTORY;stateTime=0;
    return;
  }

  ctx.globalAlpha=1;

  if(t>0.5){
    ctx.globalAlpha=0.5+Math.sin(t*2)*0.3;
    drawText(phase>=5?'TAP TO FINISH':'TAP TO CONTINUE',W/2,H-15,'bold 14px monospace','#ffcc44','center');
    ctx.globalAlpha=1;
  }
}

// ---------------------------------------------------------------------------
// RENDER
// ---------------------------------------------------------------------------
function render(){
  ctx.clearRect(0,0,W,H);

  // Transition fade
  switch(state){
    case ST.TITLE:drawTitle();break;
    case ST.HOW:drawHowToPlay();break;
    case ST.CAREER:drawCareerSelect();break;
    case ST.INTRO:drawFightIntro();break;
    case ST.FIGHT:drawFight();break;
    case ST.KD:drawKnockdown();break;
    case ST.ROUND_END:drawRoundEnd();break;
    case ST.RESULT:drawResult();break;
    case ST.VICTORY:drawVictory();break;
    case ST.PAUSE:drawPause();break;
    case ST.H2H:drawH2HMenu();break;
    case ST.SPECIAL_CUT:drawSpecialCutscene();break;
    case ST.ORIGIN_CUT:drawOriginCutscene();break;
    case ST.TRAVEL_CUT:drawTravelCutscene();break;
    case ST.VICTORY_CUT:drawVictoryCutscene();break;
  }

  // Fade transition overlay
  if(transition.active){
    ctx.fillStyle=`rgba(0,0,0,${transition.alpha})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ---------------------------------------------------------------------------
// GAME LOOP
// ---------------------------------------------------------------------------
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;

  try{
    update(dt);
    render();
  }catch(e){
    // Recover gracefully — never let an error kill the game loop
    console.error('Game loop error:',e);
  }

  requestAnimationFrame(gameLoop);
}

// ---------------------------------------------------------------------------
// START
// ---------------------------------------------------------------------------
loadGame();
requestAnimationFrame(gameLoop);

</script>
